<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Shinobi Dash</title>
  <style>
    @font-face {
      font-family: "PixelMplus12";
      src: url("fonts/pixelmplus/PixelMplus-20130602/PixelMplus12-Regular.ttf") format("truetype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    :root {
      color-scheme: dark;
      --bg: #0b0b12;
      --panel: #090b12;
      --panel-strong: #17120c;
      --ink: #fff3ba;
      --muted: #d5a947;
      --gold: #ffd700;
      --gold-dark: #986a08;
      --red: #ff304f;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-user-drag: none;
      -webkit-user-select: none;
      user-select: none;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      font-family: "PixelMplus12", "DotGothic16", "MS Gothic", "Yu Gothic", ui-monospace, monospace;
      letter-spacing: 0;
      overscroll-behavior: none;
    }

    body {
      display: grid;
      place-items: center;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    #game-shell {
      position: relative;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      background: #020712;
    }

    @media (orientation: landscape) {
      #game-shell {
        width: min(100vw, calc(100dvh * 16 / 9));
        height: min(100dvh, calc(100vw * 9 / 16));
      }
    }

    #game {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      cursor: crosshair;
      image-rendering: pixelated;
      touch-action: none;
    }

    #orientation-hint {
      position: absolute;
      inset: 0;
      z-index: 30;
      display: none;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at 50% 24%, rgba(255, 216, 106, 0.16), transparent 34%),
        rgba(2, 7, 18, 0.94);
      color: #fff1b6;
      text-align: center;
      pointer-events: auto;
    }

    .orientation-card {
      display: grid;
      gap: 12px;
      max-width: 320px;
      font-size: 18px;
      line-height: 1.45;
      text-shadow: 3px 3px 0 #050506;
    }

    .orientation-phone {
      position: relative;
      justify-self: center;
      width: 96px;
      height: 58px;
      border: 5px solid #ffe06c;
      background: #07101d;
      box-shadow:
        0 0 0 4px #050506,
        8px 8px 0 rgba(0, 0, 0, 0.45);
    }

    .orientation-phone::before,
    .orientation-phone::after {
      content: "";
      position: absolute;
      background: #ffe06c;
    }

    .orientation-phone::before {
      left: 9px;
      top: 50%;
      width: 5px;
      height: 5px;
      transform: translateY(-50%);
    }

    .orientation-phone::after {
      right: -28px;
      top: 13px;
      width: 17px;
      height: 17px;
      border: 4px solid #ffe06c;
      border-left-color: transparent;
      border-bottom-color: transparent;
      background: transparent;
      transform: rotate(45deg);
    }

    @media (orientation: portrait) and (max-width: 820px) {
      #orientation-hint {
        display: grid;
      }
    }

    .hud {
      position: absolute;
      top: calc(18px + env(safe-area-inset-top));
      left: calc(18px + env(safe-area-inset-left));
      right: calc(18px + env(safe-area-inset-right));
      display: flex;
      justify-content: flex-end;
      align-items: flex-start;
      gap: 12px;
      pointer-events: none;
      z-index: 2;
    }

    .score-panel {
      min-width: 126px;
      padding: 10px 12px;
      border: 3px solid #c28a1b;
      background: linear-gradient(180deg, #271006, var(--panel));
      box-shadow:
        0 0 0 2px #050506,
        6px 6px 0 rgba(0, 0, 0, 0.48),
        inset 0 0 0 2px rgba(255, 226, 119, 0.18),
        0 0 20px rgba(255, 194, 55, 0.12);
    }

    .score-panel.right {
      min-width: 98px;
      text-align: right;
    }

    .score-panel:not(.right) {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
    }

    .label {
      color: var(--muted);
      font-size: clamp(10px, 1.6vw, 13px);
      line-height: 1.1;
    }

    .value {
      color: var(--ink);
      font-size: clamp(22px, 5vw, 40px);
      line-height: 1;
      margin-top: 6px;
      text-shadow:
        2px 0 #4b0710,
        0 2px #4b0710,
        0 0 18px rgba(255, 215, 0, 0.28);
    }

    .hard-hearts {
      display: none;
      justify-content: center;
      gap: 6px;
      margin-top: 8px;
      min-height: 20px;
    }

    .hard-hearts.active {
      display: flex;
    }

    .hud-heart {
      position: relative;
      width: 28px;
      height: 24px;
      filter: drop-shadow(2px 2px 0 #050506);
    }

    .hud-heart::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      width: 4px;
      height: 4px;
      background: #ff304f;
      box-shadow:
        4px 0 #ff304f, 16px 0 #ff304f, 20px 0 #ff304f,
        0 4px #ff304f, 4px 4px #ff7a7a, 8px 4px #ff304f, 12px 4px #ff304f, 16px 4px #ff304f, 20px 4px #ff304f, 24px 4px #ff304f,
        0 8px #c4142b, 4px 8px #ff304f, 8px 8px #ff304f, 12px 8px #ff304f, 16px 8px #ff304f, 20px 8px #c4142b, 24px 8px #9d1025,
        4px 12px #c4142b, 8px 12px #ff304f, 12px 12px #ff304f, 16px 12px #c4142b, 20px 12px #9d1025,
        8px 16px #c4142b, 12px 16px #c4142b, 16px 16px #9d1025,
        12px 20px #9d1025;
    }

    .hud-heart.empty::before {
      background: #2a1822;
      box-shadow:
        4px 0 #2a1822, 16px 0 #2a1822, 20px 0 #2a1822,
        0 4px #2a1822, 4px 4px #5a2a34, 8px 4px #2a1822, 12px 4px #2a1822, 16px 4px #2a1822, 20px 4px #2a1822, 24px 4px #2a1822,
        0 8px #120b12, 4px 8px #2a1822, 8px 8px #2a1822, 12px 8px #2a1822, 16px 8px #2a1822, 20px 8px #120b12, 24px 8px #120b12,
        4px 12px #120b12, 8px 12px #2a1822, 12px 12px #2a1822, 16px 12px #120b12, 20px 12px #120b12,
        8px 16px #120b12, 12px 16px #120b12, 16px 16px #120b12,
        12px 20px #120b12;
    }

    #logs {
      position: absolute;
      right: 18px;
      top: 104px;
      width: min(330px, calc(100vw - 36px));
      display: grid;
      gap: 8px;
      z-index: 3;
      pointer-events: none;
    }

    .log {
      justify-self: end;
      max-width: 100%;
      padding: 8px 10px;
      border: 2px solid #3a2a0f;
      background: rgba(9, 10, 15, 0.9);
      color: #f9e7a8;
      font-size: clamp(10px, 2.3vw, 13px);
      line-height: 1.35;
      box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.42);
      overflow-wrap: anywhere;
      animation: log-in 140ms steps(3, end) both;
    }

    .log.common { border-color: #757575; }
    .log.rare { border-color: #3d9dff; color: #bfe3ff; }
    .log.epic { border-color: #b76cff; color: #efceff; }
    .log.legendary { border-color: var(--gold); color: #fff2a7; }
    .log.bonus { border-color: var(--red); color: #ffd0d8; }

    .log.leaving {
      opacity: 0;
      transform: translateY(-8px);
      transition: opacity 260ms steps(4, end), transform 260ms steps(4, end);
    }

    @keyframes log-in {
      from {
        opacity: 0;
        transform: translateX(12px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    #overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 22px;
      background: rgba(5, 5, 8, 0.58);
      z-index: 4;
      opacity: 0;
      visibility: hidden;
      transition: opacity 150ms steps(4, end), visibility 150ms steps(4, end);
    }

    #overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .gameover-panel {
      width: min(380px, 100%);
      padding: 24px;
      border: 4px solid #3b2a0a;
      background: linear-gradient(180deg, #26070b, #09090e);
      text-align: center;
      box-shadow:
        0 0 0 3px #050506,
        8px 8px 0 rgba(0, 0, 0, 0.5),
        inset 0 0 0 2px rgba(255, 215, 0, 0.12);
    }

    .gameover-panel h1 {
      margin: 0 0 16px;
      color: var(--gold);
      font-size: clamp(28px, 8vw, 48px);
      line-height: 1;
      text-shadow: 3px 3px 0 #6e4700;
    }

    #final-score {
      margin: 0 0 20px;
      color: var(--ink);
      font-size: clamp(14px, 4vw, 20px);
    }

    .gameover-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    button {
      appearance: none;
      border: 3px solid #4a3103;
      background: linear-gradient(180deg, #fff0a6, #ffbf2e 62%, #9b630a);
      color: #151005;
      padding: 12px 16px;
      font: inherit;
      font-weight: 800;
      box-shadow: 4px 4px 0 #050506;
      cursor: pointer;
    }

    button:active {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0 #050506;
    }

    #audio-toggle {
      position: absolute;
      left: calc(18px + env(safe-area-inset-left));
      bottom: calc(18px + env(safe-area-inset-bottom));
      z-index: 5;
      min-width: 92px;
      padding: 9px 11px;
      border: 2px solid rgba(255, 215, 0, 0.45);
      background: rgba(9, 8, 11, 0.82);
      color: #fff1b6;
      box-shadow:
        0 0 0 2px rgba(0, 0, 0, 0.52),
        4px 4px 0 rgba(0, 0, 0, 0.32);
    }

    #audio-toggle[data-state="off"] {
      color: #92a0ad;
      border-color: rgba(146, 160, 173, 0.35);
    }

    #fullscreen-toggle {
      position: absolute;
      right: calc(18px + env(safe-area-inset-right));
      bottom: calc(18px + env(safe-area-inset-bottom));
      z-index: 12;
      width: 48px;
      height: 48px;
      padding: 0;
      border: 2px solid rgba(255, 215, 0, 0.45);
      background: rgba(9, 8, 11, 0.82);
      box-shadow:
        0 0 0 2px rgba(0, 0, 0, 0.52),
        4px 4px 0 rgba(0, 0, 0, 0.32);
    }

    #fullscreen-toggle::before,
    #fullscreen-toggle::after {
      content: "";
      position: absolute;
      inset: 10px;
      border-color: #fff1b6;
      border-style: solid;
    }

    #fullscreen-toggle::before {
      border-width: 4px 0 0 4px;
      box-shadow:
        18px 0 0 -2px #fff1b6,
        0 18px 0 -2px #fff1b6;
    }

    #fullscreen-toggle::after {
      border-width: 0 4px 4px 0;
      box-shadow:
        -18px 0 0 -2px #fff1b6,
        0 -18px 0 -2px #fff1b6;
    }

    #fullscreen-toggle[data-state="on"]::before {
      inset: 13px 21px 21px 13px;
      box-shadow: none;
    }

    #fullscreen-toggle[data-state="on"]::after {
      inset: 21px 13px 13px 21px;
      box-shadow: none;
    }

    #fullscreen-toggle[hidden] {
      display: none;
    }

    #title-screen {
      position: absolute;
      inset: 0;
      z-index: 9;
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
      align-items: end;
      justify-items: center;
      padding: clamp(18px, 4vw, 34px) 20px clamp(18px, 5vh, 48px);
      background:
        linear-gradient(180deg, #020410 0%, #06142a 48%, #120a10 100%);
      overflow: hidden;
      transition: opacity 220ms steps(5, end), visibility 220ms steps(5, end);
    }

    #title-screen::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(90deg, transparent 0 31px, rgba(255, 229, 133, 0.09) 31px 33px, transparent 33px 97px),
        repeating-linear-gradient(180deg, transparent 0 43px, rgba(151, 190, 255, 0.08) 43px 45px, transparent 45px 111px);
      opacity: 0.26;
      pointer-events: none;
    }

    .title-scene {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .title-moon {
      position: absolute;
      top: 7vh;
      left: 50%;
      width: clamp(86px, 15vw, 172px);
      aspect-ratio: 1;
      transform: translateX(-50%);
      background:
        linear-gradient(135deg, #fff1a6 0 48%, #ffd86a 48% 76%, #b77724 76%);
      box-shadow:
        0 0 0 5px rgba(4, 5, 8, 0.8),
        0 0 0 10px rgba(255, 203, 65, 0.14),
        0 0 44px rgba(255, 207, 75, 0.28);
      clip-path: polygon(
        26% 0, 74% 0, 74% 7%, 87% 7%, 87% 20%, 100% 20%, 100% 74%,
        87% 74%, 87% 87%, 74% 87%, 74% 100%, 26% 100%, 26% 87%,
        13% 87%, 13% 74%, 0 74%, 0 26%, 13% 26%, 13% 13%, 26% 13%
      );
    }

    .title-castle {
      position: absolute;
      left: 50%;
      bottom: 27vh;
      width: clamp(190px, 36vw, 430px);
      height: clamp(130px, 24vw, 260px);
      transform: translateX(-50%);
      filter: drop-shadow(0 0 18px rgba(255, 211, 78, 0.32));
    }

    .title-castle::before {
      content: "";
      position: absolute;
      inset: 34% 8% 0;
      background:
        linear-gradient(90deg, transparent 0 7%, #5b3309 7% 10%, transparent 10% 90%, #5b3309 90% 93%, transparent 93%),
        linear-gradient(180deg, #fff1a6 0 8%, #d89a23 8% 22%, #8e5a12 22% 100%);
      border: 4px solid #050506;
      box-shadow:
        inset 0 0 0 4px rgba(255, 242, 168, 0.25),
        0 8px 0 rgba(0, 0, 0, 0.35);
    }

    .title-castle::after {
      content: "";
      position: absolute;
      left: 10%;
      right: 10%;
      top: 0;
      height: 56%;
      background:
        linear-gradient(180deg, #ffe891 0 14%, #c97916 14% 28%, transparent 28%),
        linear-gradient(90deg,
          transparent 0 5%, #050506 5% 7%, #e0a433 7% 18%, #fff0a8 18% 23%, #b96f12 23% 30%,
          transparent 30% 35%, #050506 35% 37%, #f3c447 37% 47%, #fff3ba 47% 53%, #b96f12 53% 63%,
          transparent 63% 70%, #050506 70% 72%, #e0a433 72% 84%, #fff0a8 84% 90%, #b96f12 90% 95%,
          transparent 95%);
      border-bottom: 5px solid #050506;
      clip-path: polygon(8% 100%, 8% 70%, 0 70%, 0 54%, 15% 54%, 15% 34%, 8% 34%, 8% 20%, 32% 20%, 32% 0, 68% 0, 68% 20%, 92% 20%, 92% 34%, 85% 34%, 85% 54%, 100% 54%, 100% 70%, 92% 70%, 92% 100%);
    }

    .title-mountains {
      position: absolute;
      left: -4vw;
      right: -4vw;
      bottom: 17vh;
      height: 22vh;
      background:
        linear-gradient(135deg, transparent 0 18%, #07111f 18% 38%, transparent 38%),
        linear-gradient(45deg, transparent 0 24%, #0b1728 24% 46%, transparent 46%),
        linear-gradient(135deg, transparent 0 58%, #101b2f 58% 78%, transparent 78%);
      opacity: 0.95;
    }

    .title-ground {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 28vh;
      background:
        repeating-linear-gradient(90deg, #3b2412 0 22px, #4c2d13 22px 28px, #2a170c 28px 54px),
        linear-gradient(180deg, #1b1012, #050506);
      border-top: 5px solid #7c551c;
      box-shadow: inset 0 7px 0 rgba(255, 214, 102, 0.12);
    }

    .title-ninja {
      position: absolute;
      left: clamp(26px, 10vw, 160px);
      bottom: clamp(76px, 17vh, 154px);
      width: 88px;
      height: 104px;
      filter: drop-shadow(8px 8px 0 rgba(0, 0, 0, 0.44));
    }

    .title-ninja::before {
      content: "";
      position: absolute;
      left: 24px;
      top: 10px;
      width: 42px;
      height: 46px;
      background:
        linear-gradient(90deg, transparent 0 20%, #fff1a6 20% 36%, transparent 36% 64%, #fff1a6 64% 80%, transparent 80%),
        #050506;
      box-shadow:
        4px 44px 0 10px #0d111c,
        -10px 54px 0 4px #050506,
        26px 54px 0 4px #050506,
        11px 84px 0 4px #050506,
        31px 84px 0 4px #050506;
      clip-path: polygon(18% 0, 82% 0, 100% 22%, 100% 86%, 82% 100%, 18% 100%, 0 86%, 0 22%);
    }

    .title-ninja::after {
      content: "";
      position: absolute;
      left: 49px;
      top: 46px;
      width: 52px;
      height: 6px;
      background: #d8a037;
      transform: rotate(-22deg);
      box-shadow:
        34px -10px 0 -1px #fff2a8,
        -21px 8px 0 0 #050506;
    }

    .title-treasure {
      position: absolute;
      right: clamp(20px, 9vw, 150px);
      bottom: clamp(56px, 12vh, 112px);
      width: clamp(130px, 20vw, 230px);
      height: clamp(64px, 10vw, 112px);
    }

    .title-treasure::before {
      content: "";
      position: absolute;
      left: 12%;
      right: 12%;
      bottom: 0;
      height: 46%;
      background:
        linear-gradient(90deg, transparent 0 42%, #ffe06c 42% 58%, transparent 58%),
        linear-gradient(180deg, #a55a1c 0 45%, #6b3515 45% 100%);
      border: 4px solid #050506;
      box-shadow:
        0 -18px 0 -4px #d18625,
        0 -24px 0 -8px #050506,
        -28px 6px 0 -6px #ffe06c,
        32px 10px 0 -7px #fff2a8,
        62px -4px 0 -8px #67d7ff;
    }

    .title-treasure::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, transparent 0 7%, #ffe06c 7% 13%, transparent 13% 23%, #fff2a8 23% 30%, transparent 30% 50%, #67d7ff 50% 58%, transparent 58% 72%, #ff6ba3 72% 80%, transparent 80%),
        linear-gradient(180deg, transparent 0 48%, rgba(255, 224, 108, 0.26) 48% 54%, transparent 54%);
    }

    .title-logo {
      position: relative;
      z-index: 1;
      align-self: start;
      margin: 0;
      padding-top: clamp(18px, 4vh, 46px);
      color: #ffe06c;
      font-size: clamp(42px, 11vw, 112px);
      line-height: 0.92;
      text-align: center;
      text-shadow:
        4px 0 #050506,
        0 4px #050506,
        7px 7px 0 #5a2408,
        0 0 28px rgba(255, 215, 0, 0.5);
    }

    #title-screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    #title-menu {
      position: relative;
      z-index: 1;
      width: min(680px, 90vw);
      display: grid;
      justify-items: center;
      gap: 12px;
    }

    .mode-row {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    #title-start,
    #title-hard {
      min-width: 0;
      padding: clamp(12px, 2.4vw, 20px) clamp(12px, 4vw, 30px);
      border: 4px solid #ffd86a;
      background: linear-gradient(180deg, #fff1a6, #ffbc2a 52%, #6d3906);
      color: #130805;
      font-size: clamp(21px, 4.8vw, 42px);
      line-height: 1;
      text-shadow:
        2px 2px 0 #fff5ba,
        0 0 18px rgba(255, 219, 101, 0.9);
      box-shadow:
        0 0 0 4px #050506,
        0 0 32px rgba(255, 205, 54, 0.62),
        8px 8px 0 rgba(0, 0, 0, 0.55);
    }

    #title-hard {
      border-color: #ff7a7a;
      background: linear-gradient(180deg, #ffe1a6, #ff5d4a 52%, #4b0710);
      color: #180506;
      box-shadow:
        0 0 0 4px #050506,
        0 0 30px rgba(255, 65, 65, 0.42),
        8px 8px 0 rgba(0, 0, 0, 0.55);
    }

    #collection-open {
      min-width: min(310px, 58vw);
      padding: 10px 18px;
      border-color: #b78328;
      background: linear-gradient(180deg, #2b1b0d, #100c0b);
      color: #ffe6a0;
      font-size: clamp(15px, 3.4vw, 23px);
      box-shadow:
        0 0 0 3px #050506,
        6px 6px 0 rgba(0, 0, 0, 0.55),
        inset 0 0 0 2px rgba(255, 215, 0, 0.14);
    }

    #title-screen {
      display: block;
      padding: 0;
      background: #020712;
    }

    #title-screen::before {
      content: none;
    }

    .title-frame {
      position: absolute;
      left: 50%;
      top: 50%;
      width: max(100vw, calc(100vh * 2.3571428571));
      height: max(100vh, calc(100vw * 0.4242424242));
      transform: translate(-50%, -50%);
      overflow: hidden;
    }

    .title-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      object-fit: fill;
      -webkit-user-drag: none;
      pointer-events: none;
    }

    #title-menu {
      position: absolute;
      inset: 0;
      z-index: 1;
      width: 100%;
      height: 100%;
      display: block;
      pointer-events: auto;
    }

    .mode-row {
      display: contents;
    }

    #title-start,
    #title-hard,
    #collection-open {
      position: absolute;
      min-width: 0;
      padding: 0;
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: transparent;
      font-size: 0;

          return Number(localStorage.getItem(key) || fallback || 0);

      }

        try {
          const key = BEST_STORAGE_KEYS[mode] || BEST_STORAGE_KEYS.normal;
          localStorage.setItem(key, String(value));
        } catch (error) {
          // Storage can be blocked in some file:// browser contexts.
        }

      function readCollection() {
        try {
          const saved = JSON.parse(localStorage.getItem(COLLECTION_STORAGE_KEY) || "{}");
          return saved && typeof saved === "object" ? saved : {};
        } catch (error) {

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function randomRange(min, max) {
        return min + Math.random() * (max - min);

      function randomInt(min, max) {
        return Math.round(randomRange(min, max));

      function paintPixelSprite(target, rows, palette, x, y, scale, flip) {
        for (let row = 0; row < rows.length; row += 1) {
          const line = rows[row];
          for (let col = 0; col < line.length; col += 1) {
            const key = line[col];
            if (key === ".") {
              continue;
            }
            const drawCol = flip ? line.length - 1 - col : col;
            target.fillStyle = palette[key] || palette.k || "#050506";
            target.fillRect(Math.round(x + drawCol * scale), Math.round(y + row * scale), scale, scale);
          }
        }
      }

      function paintSpriteOutline(target, rows, x, y, scale, flip, color) {
        const hasPixel = (row, col) => Boolean(rows[row] && rows[row][col] && rows[row][col] !== ".");
        const directions = [
          [0, -1],
          [1, 0],
          [0, 1],
          [-1, 0]
        ];
        target.fillStyle = color;
        for (let row = 0; row < rows.length; row += 1) {
          const line = rows[row];
          for (let col = 0; col < line.length; col += 1) {
            if (!hasPixel(row, col)) {
              continue;
            }
            const drawCol = flip ? line.length - 1 - col : col;
            for (const [dx, dy] of directions) {
              if (hasPixel(row + dy, col + dx)) {
                continue;
              }
              const outlineCol = drawCol + (flip ? -dx : dx);
              target.fillRect(Math.round(x + outlineCol * scale), Math.round(y + (row + dy) * scale), scale, scale);
            }
          }
        }
      }

        view.dpr = Math.min(window.devicePixelRatio || 1, MAX_DPR);
        view.groundY = Math.round(view.h * 0.72);
        view.startX = Math.round(clamp(view.w * 0.12, 58, 116));

        canvas.width = Math.floor(view.w * view.dpr);
        canvas.height = Math.floor(view.h * view.dpr);
        ctx.setTransform(view.dpr, 0, 0, view.dpr, 0, 0);
        ctx.imageSmoothingEnabled = false;

        if (game.state !== "falling" && game.state !== "gameover") {
          game.hero.y = view.groundY - HERO.h;
        }
      }

      function makeBonus(platform) {
        const roll = Math.random();
        const width = Math.round(Math.min(platform.w - 8, clamp(platform.w * 0.18, 8, 20)));
        const side = Math.random() < 0.5 ? "left" : "right";
        const x = side === "left" ? platform.x : platform.x + platform.w - width;
        if (roll < RAINBOW_BONUS_CHANCE) {
          return {
            type: "rainbow",
            multiplier: 10,
            x,
            w: width
          };
        }
        if (roll < RAINBOW_BONUS_CHANCE + RED_BONUS_CHANCE) {
          return {
            type: "red",
            multiplier: 3,
            x,
            w: width
          };
        }
        return null;
      }

      function makeChest(platform) {
        if (Math.random() >= CHEST_CHANCE || platform.w < 44) {
          return null;
        }
        const width = Math.round(clamp(platform.w * 0.28, 18, 26));
        const minX = platform.x + 7;
        const maxX = platform.x + platform.w - width - 7;
        if (maxX <= minX) {
          return null;
        }
        for (let attempt = 0; attempt < 8; attempt += 1) {
          const x = randomInt(minX, maxX);
          const overlapsBonus = platform.bonus && x < platform.bonus.x + platform.bonus.w + 6 && x + width > platform.bonus.x - 6;
          if (!overlapsBonus) {
            return { x, w: width, opened: false, itemId: "" };
          }
        }
        return null;
      }

      function randomPlatformWidth() {
        if (Math.random() < THIN_PLATFORM_CHANCE) {
          const min = clamp(view.w * 0.04, 24, 34);
          const max = clamp(view.w * 0.065, 34, 48);
          return randomInt(min, max);
        }
        const min = clamp(view.w * 0.08, 48, 78);
        const max = clamp(view.w * 0.17, 84, 136);
        return randomInt(min, max);
      }

      function maxGeneratedGap() {
        return clamp(view.w * 0.3, 120, 280);
      }

      function randomGap() {
        const min = clamp(view.w * 0.09, 52, 112);
        const max = maxGeneratedGap();
        return randomInt(min, max);
      }

      function createPlatform(x, w, allowBonus) {
        const platform = {
          x,
          w,
          bonus: null,
          chest: null
        };
        if (allowBonus) {
          platform.bonus = makeBonus(platform);
          platform.chest = makeChest(platform);
        }
        return platform;
      }

      function addPlatformAhead() {
        const last = game.platforms[game.platforms.length - 1];
        const x = Math.round(last.x + last.w + randomGap());
        game.platforms.push(createPlatform(x, randomPlatformWidth(), true));
      }

      function ensurePlatformsAhead() {
        while (game.platforms.length < game.currentIndex + 3) {
          addPlatformAhead();
        }
      }

      function makeBridge() {
        const current = game.platforms[game.currentIndex];
        return {
          anchorX: current.x + current.w,
          len: 0,
          angle: -Math.PI / 2,
          tipTime: 0,
          tipProgress: 0,
          settleTime: 0,
          landSoundPlayed: false,
          success: false,
          multiplier: 1,
          bonusType: null,
          chestItem: null,
          chestWasNew: false,
          gain: 0
        };
      }

      function resetGame() {
        logsEl.textContent = "";
        stopExtendSfx();
        overlayEl.classList.remove("active");
        overlayEl.setAttribute("aria-hidden", "true");
        game.effects = [];
        game.hero.skin = heroSkins[game.skinIndex % heroSkins.length];
        game.skinIndex += 1;

        const firstWidth = Math.round(clamp(view.w * 0.16, 92, 148));
        game.platforms = [
          createPlatform(view.startX, firstWidth, false)
        ];
        game.currentIndex = 0;
        addPlatformAhead();
        addPlatformAhead();

        const first = game.platforms[0];
        game.bridge = makeBridge();
        game.hero.x = first.x + first.w - HERO.w - 12;
        game.hero.y = view.groundY - HERO.h;
        game.hero.vy = 0;
        game.hero.kickTime = 0;
        game.hero.slashTime = 0;
        game.hero.slashCooldown = 0;
        game.cameraX = 0;
        game.targetCameraX = 0;
        game.walkTarget = 0;
        game.score = 0;
        game.best = readBest(game.mode);
        game.state = "waiting";
        game.pointerHeld = false;
        game.bridgePointerId = null;
        game.arrows = [];
        game.nextArrowIn = randomRange(HARD_ARROW_MIN_DELAY, HARD_ARROW_MAX_DELAY);
        game.arrowHits = 0;
        game.arrowHitFlash = 0;
        game.islandWaitTime = 0;
        game.slashButtonDown = false;
        game.speech = null;
        updateHud();
      }

      function updateHud() {
        scoreEl.textContent = String(game.score);
        bestEl.textContent = String(game.best);
        updateHardHeartHud();
      }

      function updateHardHeartHud() {
        const show = game.mode === "hard" && !game.titleActive;
        hardHeartsEl.classList.toggle("active", show);
        hardHeartsEl.setAttribute("aria-hidden", show ? "false" : "true");
        if (!show) {
          hardHeartsEl.innerHTML = "";
          return;
        }
        const filled = clamp(HARD_ARROW_HEARTS - game.arrowHits, 0, HARD_ARROW_HEARTS);
        hardHeartsEl.innerHTML = "";
        for (let i = 0; i < HARD_ARROW_HEARTS; i += 1) {
          const heart = document.createElement("span");
          heart.className = i < filled ? "hud-heart" : "hud-heart empty";
          hardHeartsEl.appendChild(heart);
        }
      }

      function startGrow() {
        if (game.titleActive) {
          return false;
        }
        if (game.state !== "waiting") {
          return false;
        }
        startBgm();
        startExtendSfx();
        game.bridge = makeBridge();
        game.pointerHeld = true;
        game.islandWaitTime = 0;
        game.state = "growing";
        return true;
      }

      function startFromTitle(mode) {
        game.mode = mode || "normal";
        game.best = readBest(game.mode);
        game.titleActive = false;
        titleScreenEl.classList.add("hidden");
        titleScreenEl.setAttribute("aria-hidden", "true");
        resetGame();
        setupSfx();
        playSfx(sfxStartEl);
        startBgm(true);
      }

      function returnToTitle() {
        game.titleActive = true;
        stopExtendSfx();
        overlayEl.classList.remove("active");
        overlayEl.setAttribute("aria-hidden", "true");
        titleScreenEl.classList.remove("hidden");
        titleScreenEl.setAttribute("aria-hidden", "false");
        resetGame();
        startTitleBgm();
      }

      function releaseBridge() {
        if (game.state !== "growing") {
          return false;
        }
        game.pointerHeld = false;
        game.bridgePointerId = null;
        stopExtendSfx();
        game.hero.kickTime = 0.24;
        game.bridge.len = Math.max(1, game.bridge.len);
        game.bridge.tipTime = 0;
        game.bridge.tipProgress = 0;
        game.bridge.landSoundPlayed = false;
        game.state = "tipping";
        return true;
      }

      function hardBridgeCeilingLength() {
        return Math.max(1, view.groundY - HARD_BRIDGE_CEILING_MARGIN, maxGeneratedGap() + 58);
      }

      function bridgeReachedCeiling() {
        return game.mode === "hard"
          && game.bridge
          && game.bridge.len >= hardBridgeCeilingLength();
      }

      function breakBridgeAtCeiling() {
        stopExtendSfx();
        game.pointerHeld = false;
        game.bridgePointerId = null;
        game.bridge = makeBridge();
        game.islandWaitTime = 0;
        game.state = "waiting";
        applyHardDamage("BRIDGE LIMIT", true);
      }

      function startWalkSpeech() {
        if (game.mode === "hard") {
          game.speech = null;
          return;
        }
        if (Math.random() >= 0.2) {
          game.speech = null;
          return;
        }
        game.speech = {
          text: ninjaSpeechLines[Math.floor(Math.random() * ninjaSpeechLines.length)],
          age: 0,
          duration: 1.55
        };
      }

      function resolveBridge() {
        const bridge = game.bridge;
        const next = game.platforms[game.currentIndex + 1];
        const tipX = bridge.anchorX + bridge.len;
        bridge.success = tipX >= next.x && tipX <= next.x + next.w;
        bridge.multiplier = 1;
        bridge.bonusType = null;
        bridge.chestItem = null;
        bridge.chestWasNew = false;

        if (bridge.success && next.bonus) {
          const bonus = next.bonus;
          const bonusHit = tipX >= bonus.x && tipX <= bonus.x + bonus.w;
          if (bonusHit) {
            bridge.multiplier = bonus.multiplier;
            bridge.bonusType = bonus.type;
            spawnPopup(`x${bonus.multiplier}!!`, tipX, view.groundY - 46, bonus.type);
            playSfx(sfxBonusEl);
          }
        }

        if (bridge.success && next.chest && !next.chest.opened) {
          const chest = next.chest;
          const chestHit = tipX >= chest.x && tipX <= chest.x + chest.w;
          if (chestHit) {
            const result = unlockRandomCollectionItem();
            next.chest.opened = true;
            next.chest.itemId = result.item.id;
            bridge.chestItem = result.item;
            bridge.chestWasNew = result.isNew;
            spawnPopup(result.item.name, tipX, view.groundY - 82, "chest", result.item, result.isNew);
            playSfx(sfxBonusEl);
          }
        }

        bridge.angle = 0;
        bridge.tipProgress = 1;
        bridge.settleTime = BRIDGE_SETTLE_DURATION;

        if (bridge.success) {
          game.walkTarget = next.x + next.w - HERO.w - 12;
        } else {
          game.walkTarget = bridge.anchorX + bridge.len - HERO.w * 0.5;
        }
        game.state = "walking";
        startWalkSpeech();
      }

      function finishWalk() {
        const bridge = game.bridge;
        game.speech = null;
        if (!bridge.success) {
          game.hero.vy = 0;
          playSfx(sfxFallEl);
          game.state = "falling";
          return;
        }

        bridge.gain = Math.round(bridge.len * bridge.multiplier);
        game.score += bridge.gain;
        if (game.score > game.best) {
          game.best = game.score;
          writeBest(game.best, game.mode);
        }
        updateHud();

        if (bridge.multiplier > 1) {
          const cls = bridge.bonusType === "rainbow" ? "legendary" : "bonus";
          pushLog(`BONUS x${bridge.multiplier} +${bridge.gain}`, cls);
        }
        if (bridge.chestItem) {
          pushLog(`${bridge.chestWasNew ? "NEW" : "RELIC"}: ${bridge.chestItem.name}`, "legendary");
        }

        game.currentIndex += 1;
        ensurePlatformsAhead();
        const current = game.platforms[game.currentIndex];
        game.targetCameraX = current.x - view.startX;
        game.state = "shifting";
      }

      function completeShift() {
        game.cameraX = game.targetCameraX;
        if (game.currentIndex > 0) {
          game.platforms = game.platforms.slice(game.currentIndex);
          game.currentIndex = 0;
        }
        ensurePlatformsAhead();

        const current = game.platforms[0];
        game.bridge = makeBridge();
        game.hero.x = current.x + current.w - HERO.w - 12;
        game.hero.y = view.groundY - HERO.h;
        game.hero.kickTime = 0;
        game.islandWaitTime = 0;
        game.state = "waiting";
      }

      function setGameOver() {
        game.state = "gameover";
        game.pointerHeld = false;
        finalScoreEl.textContent = `SCORE ${game.score}`;
        playSfx(sfxVictoryEl);
        overlayEl.classList.add("active");
        overlayEl.setAttribute("aria-hidden", "false");
      }

      function getCollectionItem(id) {
        return collectionItems.find((item) => item.id === id) || collectionItems[0];
      }

      function rollCollectionRarity() {
        const roll = Math.random();
        let threshold = 0;
        for (const rarity of collectionRarityOrder) {
          threshold += rarityMeta[rarity].chance;
          if (roll < threshold) {
            return rarity;
          }
        }
        return "epic";
      }

      function formatRarityChance(chance) {
        const percent = chance * 100;
        return Number.isInteger(percent) ? `${percent}%` : `${percent.toFixed(1)}%`;
      }

      function unlockRandomCollectionItem() {
        const rarity = rollCollectionRarity();
        let pool = collectionItems.filter((item) => item.rarity === rarity && !game.collection[item.id]);
        if (!pool.length) {
          pool = collectionItems.filter((item) => item.rarity === rarity);
        }
        if (!pool.length) {
          pool = collectionItems.filter((item) => !game.collection[item.id]);
        }
        if (!pool.length) {
          pool = collectionItems;
        }
        const item = pool[Math.floor(Math.random() * pool.length)];
        const isNew = !game.collection[item.id];
        game.collection[item.id] = true;
        writeCollection();
        if (collectionScreenEl.classList.contains("active")) {
          renderCollection();
        }
        return { item, isNew };
      }

      function paintLockIcon(target, size) {
        const rows = [
          "............",
          "....kkkk....",
          "...k....k...",
          "...k....k...",
          "..kkkkkkkk..",
          "..kddddddk..",
          "..kddllddk..",
          "..kddllddk..",
          "..kddddddk..",
          "..kkkkkkkk..",
          "............",
          "............"
        ];
        paintPixelSprite(target, rows, { k: "#050506", d: "#2b303a", l: "#8b96a6" }, Math.round((size - 48) / 2), Math.round((size - 48) / 2), 4, false);
      }

      function renderItemIcon(canvasNode, item, collected) {
        const target = canvasNode.getContext("2d");
        const size = canvasNode.width;
        target.clearRect(0, 0, size, size);
        target.imageSmoothingEnabled = false;
        if (!collected) {
          return;
        }
        const cols = item.icon[0].length;
        const rows = item.icon.length;
        const scale = Math.max(1, Math.floor(size / Math.max(cols, rows)));
        const spriteW = cols * scale;
        const spriteH = rows * scale;
        paintPixelSprite(target, item.icon, item.palette, Math.round((size - spriteW) / 2), Math.round((size - spriteH) / 2), scale, false);
      }

      function selectCollectionItem(id) {
        const item = getCollectionItem(id);
        game.selectedItemId = item.id;
        for (const node of collectionGridEl.querySelectorAll(".collection-item")) {
          node.classList.toggle("selected", node.dataset.id === item.id);
        }
        collectionNameEl.textContent = item.name;
        collectionFlavorEl.textContent = item.flavor;
      }

      function selectLockedCollectionItem(id) {
        game.selectedItemId = "";
        for (const node of collectionGridEl.querySelectorAll(".collection-item")) {
          node.classList.toggle("selected", node.dataset.id === id);
        }
        collectionNameEl.textContent = "未獲得";
        collectionFlavorEl.textContent = "宝箱から見つけるまで、この品の名と記憶は影に伏せられています。";
      }

      function clearCollectionDetail() {
        game.selectedItemId = "";
        for (const node of collectionGridEl.querySelectorAll(".collection-item")) {
          node.classList.remove("selected");
        }
        collectionNameEl.textContent = "COLLECTION";
        collectionFlavorEl.textContent = "獲得済みの品を選ぶと、ここに名と記憶が表示されます。";
      }

      function renderCollection() {
        collectionGridEl.textContent = "";
        const collectedItems = collectionItems.filter((item) => game.collection[item.id]);

        for (const rarity of collectionRarityOrder) {
          const rarityItems = collectionItems.filter((item) => item.rarity === rarity);
          const collectedCount = rarityItems.filter((item) => game.collection[item.id]).length;
          const meta = rarityMeta[rarity] || rarityMeta.common;
          const block = document.createElement("section");
          block.className = "collection-rarity-block";
          block.dataset.rarity = rarity;

          const heading = document.createElement("div");
          heading.className = "collection-rarity-heading";

          const title = document.createElement("span");
          title.className = "collection-rarity-title";
          title.textContent = `${meta.label} (${formatRarityChance(meta.chance)})`;

          const count = document.createElement("span");
          count.className = "collection-rarity-count";
          count.textContent = `${collectedCount}/${rarityItems.length}`;

          heading.append(title, count);

          const itemsWrap = document.createElement("div");
          itemsWrap.className = "collection-rarity-items";

          for (const item of rarityItems) {
            const collected = Boolean(game.collection[item.id]);
            const button = document.createElement("button");
            button.type = "button";
            button.className = "collection-item";
            button.dataset.id = item.id;
            button.dataset.collected = String(collected);

            if (collected) {
              button.setAttribute("aria-label", item.name);
              const icon = document.createElement("canvas");
              icon.width = 64;
              icon.height = 64;
              renderItemIcon(icon, item, true);
              button.append(icon);
              button.addEventListener("click", () => selectCollectionItem(item.id));
            } else {
              button.setAttribute("aria-label", "未獲得");
              button.addEventListener("click", () => selectLockedCollectionItem(item.id));
            }
            itemsWrap.append(button);
          }

          block.append(heading, itemsWrap);
          collectionGridEl.append(block);
        }
        if (game.selectedItemId && game.collection[game.selectedItemId]) {
          selectCollectionItem(game.selectedItemId);
        } else if (!collectedItems.length) {
          clearCollectionDetail();
        } else {
          clearCollectionDetail();
        }
      }

      function showCollection() {
        game.selectedItemId = "";
        game.effects = game.effects.filter((effect) => !effect.item);
        renderCollection();
        startTitleBgm();
        collectionScreenEl.classList.add("active");
        collectionScreenEl.setAttribute("aria-hidden", "false");
      }

      function hideCollection() {
        collectionScreenEl.classList.remove("active");
        collectionScreenEl.setAttribute("aria-hidden", "true");
        if (game.titleActive) {
          startTitleBgm();
        }
      }

      function pushLog(message, type) {
        const node = document.createElement("div");
        node.className = `log ${type}`;
        node.textContent = message;
        logsEl.prepend(node);

        while (logsEl.children.length > 5) {
          logsEl.lastElementChild.remove();
        }

        window.setTimeout(() => node.classList.add("leaving"), 2600);
        window.setTimeout(() => {
          if (node.parentElement) {
            node.remove();
          }
        }, 3000);
      }

      function updateAudioButton() {
        if (!audio.enabled) {
          audioToggle.textContent = "BGM OFF";
          audioToggle.dataset.state = "off";
          return;
        }
        if (audio.started && !bgmEl.paused) {
          audioToggle.textContent = "BGM ON";
          audioToggle.dataset.state = "on";
          return;
        }
        audioToggle.textContent = "BGM";
        audioToggle.dataset.state = "off";
      }

      function fullscreenElement() {
        return document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement || null;
      }

      function fullscreenSupported() {
        return Boolean(gameShell.requestFullscreen || gameShell.webkitRequestFullscreen || gameShell.msRequestFullscreen);
      }

      function updateFullscreenButton() {
        if (!fullscreenSupported()) {
          fullscreenToggle.hidden = true;
          return;
        }
        const active = Boolean(fullscreenElement());
        fullscreenToggle.hidden = false;
        fullscreenToggle.dataset.state = active ? "on" : "off";
        fullscreenToggle.setAttribute("aria-label", active ? "Exit fullscreen" : "Enter fullscreen");
        fullscreenToggle.title = active ? "Exit fullscreen" : "Fullscreen";
      }

      function afterFullscreenChange() {
        updateFullscreenButton();
        window.setTimeout(resize, 80);
      }

      function toggleFullscreen() {
        if (!fullscreenSupported()) {
          updateFullscreenButton();
          return;
        }
        const active = fullscreenElement();
        const action = active
          ? (document.exitFullscreen || document.webkitExitFullscreen || document.msExitFullscreen)
          : (gameShell.requestFullscreen || gameShell.webkitRequestFullscreen || gameShell.msRequestFullscreen);
        const target = active ? document : gameShell;
        const result = action.call(target);
        if (result && typeof result.catch === "function") {
          result.catch(() => updateFullscreenButton());
        }
      }

      function chooseRandomBgm(force) {
        if (!force && audio.currentTrack && audio.mode === "game") {
          return;
        }
        let nextTrack = bgmTracks[Math.floor(Math.random() * bgmTracks.length)];
        if (bgmTracks.length > 1) {
          while (nextTrack === audio.currentTrack) {
            nextTrack = bgmTracks[Math.floor(Math.random() * bgmTracks.length)];
          }
        }
        audio.currentTrack = nextTrack;
        bgmEl.src = nextTrack;
        bgmEl.load();
      }

      function chooseTitleBgm(force) {
        if (!force && audio.currentTrack === TITLE_BGM_TRACK) {
          return;
        }
        audio.currentTrack = TITLE_BGM_TRACK;
        audio.mode = "title";
        bgmEl.src = TITLE_BGM_TRACK;
        bgmEl.load();
      }

      function clearTitleBgmRetries() {
        for (const timer of audio.titleRetryTimers) {
          window.clearTimeout(timer);
        }
        audio.titleRetryTimers = [];
      }

      function scheduleTitleBgmRetries() {
        clearTitleBgmRetries();
        for (const delay of [700, 1800, 3600, 6500]) {
          audio.titleRetryTimers.push(window.setTimeout(() => {
            if (audio.enabled && (game.titleActive || collectionScreenEl.classList.contains("active"))) {
              startTitleBgm(false);
            }
          }, delay));
        }
      }

      function warmTitleBgmAutoplay() {
        if (!audio.enabled || audio.mode !== "title" || !bgmEl.paused) {
          return;
        }
        bgmEl.muted = true;
        bgmEl.volume = 0.52;
        const playAttempt = bgmEl.play();
        if (playAttempt && typeof playAttempt.then === "function") {
          playAttempt
            .then(() => {
              window.setTimeout(() => {
                if (audio.enabled && audio.mode === "title") {
                  bgmEl.muted = false;
                  playCurrentBgm(0.52);
                }
              }, 900);
            })
            .catch(() => {});
        } else {
          window.setTimeout(() => {
            if (audio.enabled && audio.mode === "title") {
              bgmEl.muted = false;
              playCurrentBgm(0.52);
            }
          }, 900);
        }
      }

      function playCurrentBgm(volume) {
        bgmEl.muted = false;
        bgmEl.volume = volume;
        const playAttempt = bgmEl.play();
        if (playAttempt && typeof playAttempt.then === "function") {
          playAttempt
            .then(() => {
              audio.started = true;
              audio.blocked = false;
              updateAudioButton();
            })
            .catch(() => {
              audio.blocked = true;
              updateAudioButton();
            });
        } else {
          audio.started = true;
          audio.blocked = false;
          updateAudioButton();
        }
      }

      function startTitleBgm(forceTrack) {
        if (!audio.enabled) {
          updateAudioButton();
          return;
        }
        chooseTitleBgm(Boolean(forceTrack));
        playCurrentBgm(0.52);
        warmTitleBgmAutoplay();
        scheduleTitleBgmRetries();
      }

      function startBgm(forceTrack) {
        if (!audio.enabled) {
          updateAudioButton();
          return;
        }
        clearTitleBgmRetries();
        audio.mode = "game";
        chooseRandomBgm(Boolean(forceTrack));
        playCurrentBgm(0.64);
      }

      function setupSfx() {
        sfxStartEl.volume = 0.2;
        sfxExtendEl.volume = 0.16;
        sfxLandEl.volume = 0.4;
        sfxBonusEl.volume = 0.2;
        sfxFallEl.volume = 0.11;
        sfxSlashEl.volume = 0.34;
        sfxCutEpicEl.volume = 0.12;
        sfxVictoryEl.volume = 0.42;
        audio.sfxReady = true;
      }

      function playSfx(element) {
        if (!audio.enabled) {
          return;
        }
        setupSfx();
        element.currentTime = 0;
        const playAttempt = element.play();
        if (playAttempt && typeof playAttempt.catch === "function") {
          playAttempt.catch(() => {});
        }
      }

      function startExtendSfx() {
        if (!audio.enabled) {
          return;
        }
        setupSfx();
        const playAttempt = sfxExtendEl.play();
        if (playAttempt && typeof playAttempt.catch === "function") {
          playAttempt.catch(() => {});
        }
      }

      function stopExtendSfx() {
        sfxExtendEl.pause();
        sfxExtendEl.currentTime = 0;
      }

      function spawnPopup(text, x, y, type, item, isNew) {
        const emphatic = type === "red" || type === "rainbow" || type === "chest" || type === "cutScoreEpic";
        game.effects.push({
          text,
          x,
          y,
          type,
          item: item || null,
          isNew: Boolean(isNew),
          age: 0,
          duration: item ? 1.65 : emphatic ? 1.22 : 0.78,
          lift: item ? 12 : emphatic ? 24 : 42
        });
      }

      function spawnHeartLossEffect(x, y) {
        game.effects.push({
          text: "",
          x,
          y,
          type: "heartLost",
          item: null,
          isNew: false,
          age: 0,
          duration: 0.86,
          lift: 18
        });
      }

      function updateEffects(dt) {
        for (const effect of game.effects) {
          effect.age += dt;
          effect.y -= effect.lift * dt;
        }
        game.effects = game.effects.filter((effect) => effect.age < effect.duration);
      }

      function spawnAnimal() {
        const dir = Math.random() < 0.5 ? 1 : -1;
        const roll = Math.random();
        const type = roll < 0.72 ? "crow" : "crane";
        const animal = {
          type,
          dir,
          phase: randomRange(0, 2),
          x: dir > 0 ? -90 : view.w + 90,
          y: randomRange(view.h * 0.13, view.groundY * 0.48),
          speed: randomRange(62, 104),
          scale: 2
        };
        if (type === "crane") {
          animal.y = randomRange(view.h * 0.2, view.groundY * 0.56);
          animal.speed = randomRange(46, 72);
        }
        game.animals.push(animal);
      }

      function updateAnimals(dt) {
        game.nextAnimalIn -= dt;
        if (game.nextAnimalIn <= 0) {
          spawnAnimal();
          game.nextAnimalIn = randomRange(9.5, 18);
        }

        for (const animal of game.animals) {
          animal.phase += dt;
          animal.x += animal.dir * animal.speed * dt;
        }
        game.animals = game.animals.filter((animal) => animal.x > -170 && animal.x < view.w + 170);
      }

      function spawnArrow() {
        const startX = game.cameraX + view.w + randomRange(82, 138);
        const targetX = game.hero.x + HERO.w * randomRange(0.42, 0.78);
        const targetY = game.hero.y + HERO.h * randomRange(0.26, 0.68);
        const startY = clamp(targetY + randomRange(-128, 18), 62, view.groundY - 24);
        const angle = Math.atan2(targetY - startY, targetX - startX);
        const fast = Math.random() < HARD_FAST_ARROW_CHANCE;
        const baseSpeed = randomRange(HARD_ARROW_SPEED_MIN, HARD_ARROW_SPEED_MAX) + Math.min(120, game.score * 0.9);
        const speed = fast ? baseSpeed * randomRange(HARD_FAST_ARROW_SPEED_MIN, HARD_FAST_ARROW_SPEED_MAX) : baseSpeed;
        game.arrows.push({
          x: startX,
          y: startY,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          angle,
          fast,
          broken: false,
          spin: randomRange(-9, 9),
          age: 0
        });
      }

      function heroHitRect() {
        return {
          x: game.hero.x + 6,
          y: game.hero.y + 5,
          w: HERO.w - 12,
          h: HERO.h - 8
        };
      }

      function arrowHitsHero(arrow) {
        const rect = heroHitRect();
        return arrow.x > rect.x - 15
          && arrow.x < rect.x + rect.w + 15
          && arrow.y > rect.y - 5
          && arrow.y < rect.y + rect.h + 5;
      }

      function arrowHitsSlash(arrow) {
        if (game.hero.slashTime <= 0) {
          return false;
        }
        const progress = 1 - game.hero.slashTime / SLASH_DURATION;
        const swing = 1 - Math.pow(1 - progress, 3);
        const centerX = game.hero.x + HERO.w * 0.58 + swing * 6;
        const centerY = game.hero.y + HERO.h * 0.46 - Math.sin(swing * Math.PI) * 3;
        const dx = arrow.x - centerX;
        const dy = arrow.y - centerY;
        const dist = Math.hypot(dx, dy);
        if (dist > 76 || dist < 8) {
          return false;
        }
        const angle = Math.atan2(dy, dx);
        const sweep = -2.25 + swing * 3.15;
        let diff = Math.abs(angle - sweep);
        diff = Math.min(diff, Math.PI * 2 - diff);
        return diff < 1.42;
      }

      function breakArrow(arrow) {
        const cutScore = arrowCutScore();
        arrow.broken = true;
        arrow.vx *= -0.18;
        arrow.vy = -randomRange(105, 175);
        arrow.spin = randomRange(-13, 13);
        arrow.age = 0;
        game.score += cutScore;
        if (game.score > game.best) {
          game.best = game.score;
          writeBest(game.best, game.mode);
        }
        updateHud();
        const scoreType = cutScore >= 1000 ? "cutScoreEpic" : cutScore >= 300 ? "cutScoreMedium" : "cutScoreSmall";
        spawnPopup(`+${cutScore}`, arrow.x, arrow.y - 34, scoreType);
        spawnPopup("\u65ac\u30c3", arrow.x, arrow.y - 8, "slash");
        pushLog(`ARROW CUT +${cutScore}`, "bonus");
        playSfx(sfxSlashEl);
        if (cutScore >= 1000) {
          playSfx(sfxCutEpicEl);
        }
      }

      function arrowCutScore() {
        if (game.state === "growing") {
          return 1000;
        }
        if (game.state === "walking") {
          return 300;
        }
        return 100;
      }

      function damageHeroWithArrow(arrow) {
        if (!applyHardDamage("ARROW HIT")) {
          return;
        }
        arrow.broken = true;
        arrow.vx *= 0.08;
        arrow.vy = 160;
        arrow.spin = randomRange(-10, 10);
        arrow.age = 0;
      }

      function applyHardDamage(label, force) {
        if ((!force && game.arrowHitFlash > 0) || game.state === "falling" || game.state === "gameover") {
          return false;
        }
        game.arrowHits += 1;
        game.arrowHitFlash = ARROW_HIT_INVULN;
        game.islandWaitTime = 0;
        updateHud();
        spawnHeartLossEffect(game.hero.x + HERO.w / 2, game.hero.y + 7);

        if (game.arrowHits >= HARD_ARROW_HITS_TO_GAMEOVER) {
          game.hero.vy = 0;
          stopExtendSfx();
          playSfx(sfxFallEl);
          pushLog(`${label} 3/3`, "bonus");
          game.state = "falling";
          return true;
        }

        playSfx(sfxFallEl);
        pushLog(`${label} ${game.arrowHits}/3`, "bonus");
        return true;
      }

      function strikeWithSword() {
        if (game.mode !== "hard" || game.titleActive || collectionScreenEl.classList.contains("active")) {
          return;
        }
        if (game.state === "gameover" || game.state === "falling" || game.hero.slashCooldown > 0) {
          return;
        }
        game.hero.slashTime = SLASH_DURATION;
        game.hero.slashCooldown = SLASH_COOLDOWN;
      }

      function updateHardMode(dt) {
        game.hero.slashTime = Math.max(0, game.hero.slashTime - dt);
        game.hero.slashCooldown = Math.max(0, game.hero.slashCooldown - dt);
        game.arrowHitFlash = Math.max(0, game.arrowHitFlash - dt);

        if (game.mode !== "hard") {
          game.arrows = [];
          game.arrowHits = 0;
          game.arrowHitFlash = 0;
          game.islandWaitTime = 0;
          return;
        }

        const activePlay = !game.titleActive
          && !collectionScreenEl.classList.contains("active")
          && game.state !== "gameover"
          && game.state !== "falling";

        if (activePlay) {
          game.nextArrowIn -= dt;
          if (game.nextArrowIn <= 0) {
            spawnArrow();
            const pressure = clamp(game.score / 240, 0, 0.85);
            game.nextArrowIn = randomRange(HARD_ARROW_MIN_DELAY, HARD_ARROW_MAX_DELAY) * (1 - pressure * 0.36);
          }
        }

        if (activePlay && game.state === "waiting") {
          game.islandWaitTime += dt;
          if (game.islandWaitTime >= HARD_WAIT_DAMAGE_TIME) {
            applyHardDamage("TIME UP");
          }
        } else {
          game.islandWaitTime = 0;
        }

        for (const arrow of game.arrows) {
          arrow.age += dt;
          if (arrow.broken) {
            arrow.vy += GRAVITY * 0.48 * dt;
            arrow.x += arrow.vx * dt;
            arrow.y += arrow.vy * dt;
            arrow.angle += arrow.spin * dt;
            continue;
          }

          arrow.x += arrow.vx * dt;
          arrow.y += arrow.vy * dt;
          arrow.angle = Math.atan2(arrow.vy, arrow.vx);

          if (arrowHitsSlash(arrow)) {
            breakArrow(arrow);
            continue;
          }

          if (activePlay && arrowHitsHero(arrow)) {
            damageHeroWithArrow(arrow);
          }
        }

        game.arrows = game.arrows.filter((arrow) => {
          const screenX = arrow.x - game.cameraX;
          return screenX > -180 && screenX < view.w + 180 && arrow.y < view.h + 120 && arrow.age < 7;
        });
      }

      function update(dt) {
        game.time += dt;
        updateEffects(dt);
        updateAnimals(dt);
        updateHardMode(dt);
        if (game.speech) {
          if (game.state !== "walking") {
            game.speech = null;
          } else {
            game.speech.age += dt;
            if (game.speech.age >= game.speech.duration) {
              game.speech = null;
            }
          }
        }
        if (game.hero.kickTime > 0) {
          game.hero.kickTime = Math.max(0, game.hero.kickTime - dt);
        }

        if (game.state !== "falling" && game.state !== "gameover") {
          game.hero.y = view.groundY - HERO.h;
        }

        if (game.state === "growing") {
          const hardCeilingLength = game.mode === "hard" ? hardBridgeCeilingLength() : 0;
          const maxLength = Math.max(view.w * 1.15, 340, hardCeilingLength);
          game.bridge.len = Math.min(maxLength, game.bridge.len + GROW_SPEED * dt);
          if (bridgeReachedCeiling()) {
            breakBridgeAtCeiling();
          }
          return;
        }

        if (game.state === "tipping") {
          const bridge = game.bridge;
          bridge.tipTime += dt;
          bridge.tipProgress = Math.min(1, bridge.tipTime / TIP_DURATION);
          if (!bridge.landSoundPlayed && bridge.tipProgress >= 0.88) {
            playSfx(sfxLandEl);
            bridge.landSoundPlayed = true;
          }
          const eased = 1 - Math.pow(1 - bridge.tipProgress, 3);
          bridge.angle = -Math.PI / 2 * (1 - eased);
          if (bridge.tipProgress >= 1) {
            resolveBridge();
          }
          return;
        }

        if (game.bridge && game.bridge.settleTime > 0) {
          game.bridge.settleTime = Math.max(0, game.bridge.settleTime - dt);
        }

        if (game.state === "walking") {
          const distance = game.walkTarget - game.hero.x;
          const step = WALK_SPEED * dt;
          if (Math.abs(distance) <= step) {
            game.hero.x = game.walkTarget;
            finishWalk();
          } else {
            game.hero.x += Math.sign(distance) * step;
          }
          return;
        }

        if (game.state === "shifting") {
          const diff = game.targetCameraX - game.cameraX;
          game.cameraX += diff * Math.min(1, SHIFT_SPEED * dt);
          if (Math.abs(diff) < 0.7) {
            completeShift();
          }
          return;
        }

        if (game.state === "falling") {
          game.hero.vy += GRAVITY * dt;
          game.hero.y += game.hero.vy * dt;
          if (game.hero.y > view.h + 80) {
            setGameOver();
          }
        }
      }

      function draw() {
        drawBackground();
        drawPlatforms();
        drawBridge();
        drawArrows();
        drawHero();
        drawSwordSlash();
        drawHardWaitTimer();
        drawHeroSpeech();
        if (!collectionScreenEl.classList.contains("active")) {
          drawEffects();
        }
      }

      function drawBackground() {
        const gradient = ctx.createLinearGradient(0, 0, 0, view.h);
        gradient.addColorStop(0, "#01040c");
        gradient.addColorStop(0.42, "#061527");
        gradient.addColorStop(0.7, "#0b1b2d");
        gradient.addColorStop(1, "#03060d");
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, view.w, view.h);

        const moonRadius = Math.round(clamp(view.w * 0.105, 76, 156));
        const moonX = Math.round(view.w * 0.5 - game.cameraX * 0.012);
        const moonY = Math.round(view.h * 0.15);
        drawPixelMoon(moonX, moonY, moonRadius);

        drawPixelCloud(-80 - (game.cameraX * 0.025) % 80, view.h * 0.09, 1.25);
        drawPixelCloud(view.w * 0.31 - (game.cameraX * 0.018) % 90, view.h * 0.12, 0.78);
        drawPixelCloud(view.w * 0.84 - (game.cameraX * 0.02) % 110, view.h * 0.08, 1.05);

        for (let i = 0; i < 112; i += 1) {
          const x = Math.round((i * 103 + 39 - game.cameraX * 0.055) % (view.w + 180)) - 90;
          const y = Math.round((i * 53 + 21) % Math.max(130, view.groundY - 82));
          const size = i % 15 === 0 ? 4 : 2;
          const flicker = 0.18 + Math.sin(game.time * 2 + i) * 0.07;
          ctx.fillStyle = i % 6 === 0 ? `rgba(184, 150, 75, ${0.34 + flicker})` : `rgba(150, 139, 110, ${0.12 + flicker})`;
          ctx.fillRect(x, y, size, size);
          if (i % 17 === 0) {
            ctx.fillRect(x - 3, y + 1, size + 6, 1);
            ctx.fillRect(x + 1, y - 3, 1, size + 6);
          }
        }

        drawDistantMountains();
        drawOldJapanBackdrop();
        drawNinjaVillage();
        drawAnimalTraffic();
        drawGoldPetals();
      }

      function drawPixelDisc(cx, cy, radius, cell, color) {
        const left = Math.floor((cx - radius) / cell) * cell;
        const top = Math.floor((cy - radius) / cell) * cell;
        const right = Math.ceil((cx + radius) / cell) * cell;
        const bottom = Math.ceil((cy + radius) / cell) * cell;
        ctx.fillStyle = color;
        for (let y = top; y <= bottom; y += cell) {
          for (let x = left; x <= right; x += cell) {
            const dx = x + cell * 0.5 - cx;
            const dy = y + cell * 0.5 - cy;
            if (dx * dx + dy * dy <= radius * radius) {
              ctx.fillRect(x, y, cell + 2, cell + 2);
            }
          }
        }
      }

      function drawPixelMoon(cx, cy, radius) {
        const cell = Math.round(clamp(radius / 26, 4, 6));
        const haloColors = [
          { r: radius + 44, c: "rgba(255, 200, 45, 0.028)" },
          { r: radius + 24, c: "rgba(255, 205, 55, 0.05)" },
          { r: radius + 10, c: "rgba(255, 205, 55, 0.07)" }
        ];

        for (const halo of haloColors) {
          drawPixelDisc(cx, cy, halo.r, cell, halo.c);
        }

        const craters = [
          [-0.34, -0.32, 0.13],
          [0.22, -0.18, 0.09],
          [-0.08, 0.12, 0.16],
          [0.43, 0.18, 0.08],
          [-0.42, 0.38, 0.07],
          [0.06, 0.45, 0.1]
        ];

        const left = Math.floor((cx - radius) / cell) * cell;
        const top = Math.floor((cy - radius) / cell) * cell;
        const right = Math.ceil((cx + radius) / cell) * cell;
        const bottom = Math.ceil((cy + radius) / cell) * cell;
        for (let y = top; y <= bottom; y += cell) {
          for (let x = left; x <= right; x += cell) {
            const dx = x + cell * 0.5 - cx;
            const dy = y + cell * 0.5 - cy;
            const d = Math.sqrt(dx * dx + dy * dy);
            if (d > radius) {
              continue;
            }
            const light = (dx * -0.45 + dy * -0.32) / radius;
            const edge = d / radius;
            let fill = edge > 0.9
              ? "#d99a2c"
              : light > 0.3
                ? "#ffe891"
                : light > -0.22
                  ? "#ffd766"
                  : "#efbd4b";
            for (const crater of craters) {
              const craterX = cx + radius * crater[0];
              const craterY = cy + radius * crater[1];
              const craterR = radius * crater[2];
              const cdx = x + cell * 0.5 - craterX;
              const cdy = y + cell * 0.5 - craterY;
              const craterD = Math.sqrt(cdx * cdx + cdy * cdy);
              if (craterD < craterR) {
                fill = craterD < craterR * 0.42 ? "#e7b64a" : "#d89d34";
              }
            }
            ctx.fillStyle = fill;
            ctx.fillRect(x, y, cell + 2, cell + 2);
          }
        }
      }

      function drawPixelCloud(x, y, scale) {
        const blocks = [
          [0, 18, 48, 18], [26, 8, 54, 24], [62, 0, 62, 32],
          [112, 14, 72, 24], [170, 28, 84, 14], [216, 38, 56, 8],
          [16, 35, 148, 16], [148, 45, 88, 10]
        ];
        ctx.save();
        ctx.translate(Math.round(x), Math.round(y));
        ctx.scale(scale, scale);
        ctx.fillStyle = "#6d4918";
        for (const b of blocks) {
          ctx.fillRect(b[0] - 5, b[1] + 7, b[2], b[3]);
        }
        ctx.fillStyle = "#9a6a24";
        for (const b of blocks) {
          ctx.fillRect(b[0], b[1], b[2], b[3]);
        }
        ctx.fillStyle = "#b68a39";
        ctx.fillRect(34, 12, 34, 6);
        ctx.fillRect(80, 5, 44, 8);
        ctx.fillRect(143, 20, 46, 6);
        ctx.restore();
      }

      function drawHardHearts() {
        if (game.mode !== "hard" || game.titleActive || collectionScreenEl.classList.contains("active")) {
          return;
        }
        const scale = view.w < 520 ? 3 : 4;
        const gap = scale * 3;
        const x = 18;
        const y = 80;
        const filled = clamp(HARD_ARROW_HEARTS - game.arrowHits, 0, HARD_ARROW_HEARTS);
        for (let i = 0; i < HARD_ARROW_HEARTS; i += 1) {
          drawPixelHeart(x + i * (7 * scale + gap), y, scale, i < filled);
        }
      }

      function drawPixelHeart(x, y, scale, filled) {
        const heart = [
          ".xx.xx.",
          "xxxxxxx",
          "xxxxxxx",
          ".xxxxx.",
          "..xxx..",
          "...x..."
        ];
        const fill = filled ? "#ff304f" : "#2a1822";
        const shade = filled ? "#9d1025" : "#120b12";
        const shine = filled ? "#fff1a6" : "#6f3a45";
        for (let row = 0; row < heart.length; row += 1) {
          for (let col = 0; col < heart[row].length; col += 1) {
            if (heart[row][col] !== "x") {
              continue;
            }
            const px = x + col * scale;
            const py = y + row * scale;
            ctx.fillStyle = "#050506";
            ctx.fillRect(px - 1, py - 1, scale + 2, scale + 2);
          }
        }
        for (let row = 0; row < heart.length; row += 1) {
          for (let col = 0; col < heart[row].length; col += 1) {
            if (heart[row][col] !== "x") {
              continue;
            }
            const px = x + col * scale;
            const py = y + row * scale;
            ctx.fillStyle = row >= 3 || col > 4 ? shade : fill;
            ctx.fillRect(px, py, scale, scale);
          }
        }
        ctx.fillStyle = shine;
        ctx.fillRect(x + scale, y + scale, scale, scale);
        if (!filled) {
          ctx.fillStyle = "#050506";
          ctx.fillRect(x + 2 * scale, y + 2 * scale, 3 * scale, scale);
        }
      }

      function drawDistantMountains() {
        const base = view.groundY + 110;
        ctx.fillStyle = "#0b1627";
        ctx.beginPath();
        ctx.moveTo(0, base);
        for (let x = -80; x <= view.w + 80; x += 80) {
          const peakY = view.groundY + 32 + ((x / 80) % 3) * 24;
          ctx.lineTo(x + 44 - (game.cameraX * 0.02) % 60, peakY);
          ctx.lineTo(x + 92 - (game.cameraX * 0.02) % 60, base);
        }
        ctx.lineTo(view.w, view.h);
        ctx.lineTo(0, view.h);
        ctx.fill();

        ctx.fillStyle = "#172d43";
        for (let x = -60 - (game.cameraX * 0.06) % 120; x < view.w + 160; x += 130) {
          ctx.fillStyle = "#172d43";
          ctx.fillRect(x, view.groundY + 42, 88, 24);
          ctx.fillRect(x + 18, view.groundY + 24, 48, 20);
          ctx.fillRect(x + 36, view.groundY + 5, 22, 22);
          ctx.fillStyle = "#0a1321";
          ctx.fillRect(x - 4, view.groundY + 36, 96, 10);
          ctx.fillStyle = "#172d43";
          drawRoof(x + 8, view.groundY + 23, 68, 14, "#0a1321", "#28415a");
        }
      }

      function drawOldJapanBackdrop() {
        drawRiceTerraces();

        for (let x = view.w * 0.62 - (game.cameraX * 0.04) % 760; x < view.w + 560; x += 760) {
          drawCastle(Math.round(x), Math.round(view.groundY + 30), 1);
        }
        for (let x = -260 - (game.cameraX * 0.07) % 980; x < view.w + 420; x += 980) {
          drawPagoda(Math.round(x), Math.round(view.groundY + 42), 0.82);
        }
        for (let x = 160 - (game.cameraX * 0.09) % 1120; x < view.w + 520; x += 1120) {
          drawTorii(Math.round(x), Math.round(view.groundY + 62), 0.74);
        }
        for (let x = -120 - (game.cameraX * 0.14) % 280; x < view.w + 160; x += 280) {
          drawStoneLantern(Math.round(x), Math.round(view.groundY + 78), 0.78);
        }
      }

      function drawRiceTerraces() {
        const baseY = Math.round(view.groundY + 74);
        for (let i = 0; i < 6; i += 1) {
          const y = baseY + i * 16;
          const offset = Math.round((-game.cameraX * (0.08 + i * 0.012)) % 92);
          ctx.fillStyle = i % 2 === 0 ? "rgba(211, 154, 53, 0.18)" : "rgba(71, 116, 120, 0.16)";
          ctx.fillRect(-20, y, view.w + 40, 9);
          ctx.fillStyle = "rgba(255, 220, 101, 0.22)";
          for (let x = offset - 92; x < view.w + 92; x += 92) {
            ctx.fillRect(x, y + 3, 44, 2);
          }
        }
      }

      function drawCastle(x, baseY, scale) {
        ctx.save();
        ctx.translate(x, baseY);
        ctx.scale(scale, scale);
        ctx.fillStyle = "rgba(2, 5, 12, 0.42)";
        ctx.fillRect(-76, 16, 178, 38);

        drawCastleTier(-46, -74, 86, 28);
        drawCastleTier(-60, -42, 118, 32);
        drawCastleTier(-74, -8, 150, 36);

        ctx.fillStyle = "#101a2c";
        ctx.fillRect(-52, -58, 98, 70);
        ctx.fillStyle = "#7f7a68";
        ctx.fillRect(-42, -53, 78, 61);
        ctx.fillStyle = "#18243a";
        ctx.fillRect(-26, -87, 46, 32);
        ctx.fillStyle = "#8c846b";
        ctx.fillRect(-20, -83, 34, 25);

        ctx.fillStyle = "#8a6429";
        for (let i = 0; i < 6; i += 1) {
          ctx.fillRect(-32 + i * 14, -34, 6, 7);

      function drawNinjaVillage() {

      function drawRoof(x, y, w, h, dark, light) {
        ctx.fillStyle = dark;
        ctx.beginPath();
        ctx.moveTo(x, y + h);
        ctx.lineTo(x + w * 0.5, y);
        ctx.lineTo(x + w, y + h);
        ctx.closePath();

      function drawAnimalTraffic() {
        for (const animal of game.animals) {
          if (animal.type === "crane") {

      function drawPixelCrow(animal) {
        const frame = Math.floor(animal.phase * 8) % 2;
        const sprite = frame === 0 ? [
          "................",
          ".......dd...b...",
          ".....ddddddbb...",
          "...dddddddd.....",
          ".ddddddddd......",
          "...ddd.dd.......",
          "................"
        ] : [
          "................",
          ".....dd....b....",
          "...dddddddbb....",
          ".dddddddd.......",
          "...ddddddd......",
          ".....dd.dd......",
          "................"
        ];
        const y = Math.round(animal.y + Math.sin(animal.phase * 4) * 3);
        paintPixelSprite(ctx, sprite, { d: "#050608", b: "#222833" }, Math.round(animal.x), y, animal.scale, animal.dir < 0);

      function drawPixelCrane(animal) {
        const frame = Math.floor(animal.phase * 4) % 2;
        const sprite = frame === 0 ? [
          "..................",
          ".......ggg........",
          ".....gg...gg..r...",
          "...gg......gggk...",
          ".ggg........gg....",
          "...ggggggggg......",
          ".................."
        ] : [
          "..................",
          "...gggggg.........",
          ".gg....gggg..r....",
          "..gg.....ggggk....",
          "....gggggggg......",
          ".......ggg........",
          ".................."
        ];
        const y = Math.round(animal.y + Math.sin(animal.phase * 3) * 4);
        paintPixelSprite(ctx, sprite, { k: "#11141a", g: "#8f8b78", r: "#5f1b22" }, Math.round(animal.x), y, animal.scale, animal.dir < 0);

      function drawGoldPetals() {
        for (let i = 0; i < 54; i += 1) {
          const x = Math.round((i * 91 + game.time * 22 - game.cameraX * 0.16) % (view.w + 120)) - 60;
          const y = Math.round((i * 67 + game.time * (14 + i % 5)) % (view.h + 80)) - 40;
          const w = i % 4 === 0 ? 7 : 4;
          ctx.fillStyle = i % 3 === 0 ? "#ffe06c" : "#d89419";
          ctx.fillRect(x, y, w, 3);
        }
      }

      function drawPlatforms() {
        for (const platform of game.platforms) {
          const x = Math.round(platform.x - game.cameraX);
          const w = Math.round(platform.w);
          if (x + w < -40 || x > view.w + 40) {
            continue;
          }

          const y = view.groundY;
          const h = view.h - y + 8;

          const sideInset = Math.min(16, Math.max(5, Math.floor(w * 0.14)));
          const cliff = ctx.createLinearGradient(x, y, x + w, y + h);
          cliff.addColorStop(0, "#d9c28e");
          cliff.addColorStop(0.28, "#8a7b69");
          cliff.addColorStop(0.68, "#40506c");
          cliff.addColorStop(1, "#111926");
          ctx.fillStyle = cliff;
          ctx.beginPath();
          ctx.moveTo(x + 1, y + 8);
          ctx.lineTo(x + w - 1, y + 8);
          ctx.lineTo(x + w - sideInset, view.h + 12);
          ctx.lineTo(x + sideInset, view.h + 12);
          ctx.closePath();
          ctx.fill();

          ctx.fillStyle = "#6f6656";
          ctx.fillRect(x - 2, y + 6, w + 4, 5);
          ctx.fillStyle = "rgba(255, 244, 181, 0.36)";
          ctx.fillRect(x + 5, y + 18, Math.max(5, Math.floor(w * 0.26)), 3);
          ctx.fillStyle = "rgba(202, 190, 151, 0.34)";
          ctx.fillRect(x + w - sideInset - 2, y + 26, 4, Math.max(0, h - 48));
          ctx.fillStyle = "rgba(117, 129, 151, 0.38)";
          ctx.fillRect(x + sideInset, y + 35, 3, Math.max(0, h - 58));

          ctx.fillStyle = "#6c5d48";
          ctx.fillRect(x - 3, y - 7, w + 6, 15);
          ctx.fillStyle = "#d8c79d";
          ctx.fillRect(x, y - 6, w, 12);
          ctx.fillStyle = "#f3e5bd";
          ctx.fillRect(x + 4, y - 4, Math.max(0, w - 8), 3);
          ctx.fillStyle = "#8e806b";
          ctx.fillRect(x, y + 5, w, 2);

          ctx.fillStyle = "rgba(103, 116, 137, 0.36)";
          for (let row = y + 36; row < view.h; row += 26) {
            const rx = x + sideInset + ((row / 26) % 2) * 7;
            ctx.fillRect(rx, row, Math.max(0, w - sideInset * 2 - 8), 2);
          }

          if (platform.bonus) {
            drawBonus(platform);
          }
          if (platform.chest) {
            drawChest(platform.chest);
          }
        }
      }

      function drawBonus(platform) {
        const bonus = platform.bonus;
        const x = Math.round(bonus.x - game.cameraX);

        const w = Math.round(bonus.w);
        const h = 12;

        ctx.fillStyle = "#8e806b";

        if (bonus.type === "red") {

          ctx.fillStyle = "#ff5268";
          ctx.fillRect(x + 2, y + 2, Math.max(2, w - 4), 2);
          ctx.fillStyle = "#650818";
          ctx.fillRect(x, y + h - 3, w, 2);
          return;
        }

        const colors = ["#ff304f", "#ffb000", "#ffe86a", "#54f28b", "#4bb8ff", "#bd7cff"];

          ctx.fillStyle = colors[(i / 2 + shift) % colors.length];
          ctx.fillRect(x + i, y + 1, 2, h - 2);

        ctx.fillRect(x + 2, y + 2, Math.max(2, w - 4), 2);

      function drawChest(chest) {
        const x = Math.round(chest.x - game.cameraX);
        const w = Math.round(chest.w);
        const y = Math.round(view.groundY - 24);
        const shine = 0.5 + Math.sin(game.time * 8) * 0.5;

        if (chest.opened) {
          ctx.fillStyle = `rgba(255, 224, 99, ${0.2 + shine * 0.16})`;

          ctx.fillRect(x - 2, y - 7, w + 4, 9);

          ctx.fillRect(x + 2, y - 13, Math.max(4, w - 4), 4);
        } else {
          ctx.fillStyle = "#050506";
          ctx.fillRect(x - 2, y - 1, w + 4, 17);

          ctx.fillRect(x, y, w, 15);
          ctx.fillStyle = "#c77920";
          ctx.fillRect(x + 2, y + 2, Math.max(4, w - 4), 4);
          ctx.fillStyle = "#5d2d12";
          ctx.fillRect(x, y + 8, w, 3);
        }

        ctx.fillStyle = "#ffd86a";
        ctx.fillRect(x + Math.floor(w / 2) - 2, y + 5, 4, 6);

        ctx.fillRect(x + Math.floor(w / 2) - 1, y + 5, 2, 2);
