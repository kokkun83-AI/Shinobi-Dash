      function bridgeCurveAmplitude(bridge, len) {
        let amplitude = 0;
        if (game.state === "tipping") {
          amplitude += Math.sin(bridge.tipProgress * Math.PI) * Math.min(18, 5 + len * 0.04);
        }
        if (bridge.settleTime > 0) {
          const t = bridge.settleTime / BRIDGE_SETTLE_DURATION;
          amplitude += Math.sin((1 - t) * Math.PI * 5) * t * Math.min(10, 4 + len * 0.025);
        }
        return amplitude;
      }

      function strokeBridgePath(bridge, len, width, color, offsetY) {
        const segments = Math.max(8, Math.ceil(len / 18));
        const amplitude = bridgeCurveAmplitude(bridge, len);
        ctx.beginPath();
        for (let i = 0; i <= segments; i += 1) {
          const t = i / segments;
          const x = Math.round(t * len);
          const y = Math.round(offsetY + Math.sin(t * Math.PI) * amplitude);
          if (i === 0) {
            ctx.moveTo(x, y);
          } else {
            ctx.lineTo(x, y);
          }
        }
        ctx.lineWidth = width;
        ctx.lineCap = "butt";
        ctx.lineJoin = "round";
        ctx.strokeStyle = color;
        ctx.stroke();
      }

      function drawBridge() {
        const bridge = game.bridge;
        if (!bridge || bridge.len <= 0) {
          const current = game.platforms[game.currentIndex] || game.platforms[0];
          if (!current) {
            return;
          }
          const pegX = Math.round(current.x + current.w - game.cameraX);
          ctx.fillStyle = "#050506";
          ctx.fillRect(pegX - 6, view.groundY - 9, 12, 9);
          ctx.fillStyle = "#d59b2b";
          ctx.fillRect(pegX - 4, view.groundY - 7, 8, 6);
          ctx.fillStyle = "#5b0710";
          ctx.fillRect(pegX - 2, view.groundY - 5, 4, 3);
          return;
        }

        const x = Math.round(bridge.anchorX - game.cameraX);
        const len = Math.round(bridge.len);
        ctx.save();
        ctx.translate(x, view.groundY);
        ctx.rotate(bridge.angle);
        strokeBridgePath(bridge, len, BRIDGE_WIDTH + 1, "#ffc43a", 0);
        strokeBridgePath(bridge, Math.max(0, len - 4), 3, "#fff2a8", -2);
        strokeBridgePath(bridge, Math.max(0, len - 4), 2, "#b9750e", 3);
        ctx.fillStyle = "#fff2a8";
        ctx.fillRect(len - 2, -BRIDGE_WIDTH / 2 - 2, 4, BRIDGE_WIDTH + 4);
        ctx.restore();
      }

      function drawArrows() {
        if (game.mode !== "hard" && !game.arrows.length) {
          return;
        }
        for (const arrow of game.arrows) {
          const x = Math.round(arrow.x - game.cameraX);
          const y = Math.round(arrow.y);
          ctx.save();
          ctx.translate(x, y);
          ctx.rotate(arrow.angle);
          if (arrow.broken) {
            ctx.rotate(Math.sin(arrow.age * 20) * 0.4);
            ctx.fillStyle = "#050506";
            ctx.fillRect(-13, -2, 12, 4);
            ctx.fillRect(4, -2, 12, 4);
            ctx.fillStyle = "#8d5b2c";
            ctx.fillRect(-12, -1, 10, 2);
            ctx.fillRect(5, -1, 9, 2);
            ctx.fillStyle = "#d7e5ec";
            ctx.fillRect(13, -3, 5, 6);
          } else {
            if (arrow.fast) {
              ctx.fillStyle = "rgba(255, 48, 79, 0.72)";
              ctx.fillRect(-38, -2, 16, 4);
              ctx.fillStyle = "rgba(255, 224, 108, 0.58)";
              ctx.fillRect(-54, -1, 20, 2);
              ctx.fillStyle = "rgba(255, 255, 255, 0.7)";
              ctx.fillRect(-30, -5, 10, 2);
              ctx.fillRect(-31, 3, 12, 2);
            }
            ctx.fillStyle = "#050506";
            ctx.fillRect(-21, -3, 35, 6);
            ctx.fillRect(10, -6, 9, 12);
            ctx.fillStyle = "#9c6631";
            ctx.fillRect(-19, -1, 31, 2);
            ctx.fillStyle = "#e7eef3";
            ctx.fillRect(11, -4, 8, 8);
            ctx.fillStyle = "#5b2e16";
            ctx.fillRect(-24, -5, 5, 3);
            ctx.fillRect(-24, 2, 5, 3);
            ctx.fillStyle = "#fff1a6";
            ctx.fillRect(6, -1, 5, 2);
          }
          ctx.restore();
        }
      }

      function drawSwordSlash() {
        if (game.mode !== "hard" || game.hero.slashTime <= 0) {
          return;
        }
        const progress = 1 - game.hero.slashTime / SLASH_DURATION;
        const swing = 1 - Math.pow(1 - progress, 3);
        const centerX = Math.round(game.hero.x - game.cameraX + HERO.w * 0.58 + swing * 6);
        const centerY = Math.round(game.hero.y + HERO.h * 0.46 - Math.sin(swing * Math.PI) * 3);
        const start = -2.25;
        const sweep = 3.15;
        const leadAngle = start + sweep * swing;
        const fade = progress < 0.78 ? 1 : Math.max(0, (1 - progress) / 0.22);
        const snap = Math.sin(Math.min(1, progress * 1.35) * Math.PI);
        const layers = [
          { radius: 40, width: 14, color: "#ffffff", alpha: 0.98 },
          { radius: 33, width: 8, color: "#fff7d8", alpha: 0.78 },
          { radius: 54, width: 5, color: "#dff7ff", alpha: 0.62 }
        ];

        ctx.save();
        for (const layer of layers) {
          const segments = 34;
          for (let i = 0; i < segments; i += 1) {
            const t = i / (segments - 1);
            const body = Math.sin(t * Math.PI);
            const angle = leadAngle - 1.22 + t * 1.34;
            const radius = layer.radius + body * (18 + snap * 8);
            const x = Math.round(centerX + Math.cos(angle) * radius);
            const y = Math.round(centerY + Math.sin(angle) * radius);
            const size = Math.max(3, Math.round(layer.width * (0.36 + body * 0.72)));
            ctx.globalAlpha = fade * layer.alpha * (0.34 + body * 0.66) * (0.52 + t * 0.48);
            ctx.fillStyle = layer.color;
            ctx.fillRect(x - Math.floor(size / 2), y - Math.floor(size / 2), size, size);
          }
        }

        ctx.save();
        ctx.translate(centerX, centerY);
        ctx.rotate(leadAngle);
        ctx.globalAlpha = fade * (0.34 + snap * 0.54);
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(18, -4, 58, 8);
        ctx.fillRect(38, -13, 34, 5);
        ctx.fillRect(44, 9, 38, 5);
        ctx.fillStyle = "#fff7d8";
        ctx.fillRect(13, -9, 26, 4);
        ctx.fillRect(26, 5, 22, 4);
        ctx.restore();

        ctx.globalAlpha = fade * 0.94;
        ctx.fillStyle = "#ffffff";
        for (let i = 0; i < 8; i += 1) {
          const radius = 30 + i * 6;
          const x = Math.round(centerX + Math.cos(leadAngle) * radius);
          const y = Math.round(centerY + Math.sin(leadAngle) * radius);
          const size = i < 4 ? 7 : 5;
          ctx.fillRect(x - Math.floor(size / 2), y - Math.floor(size / 2), size, size);
        }

        ctx.globalAlpha = fade * 0.38;
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(centerX - 8, centerY - 2, 12, 4);
        ctx.fillRect(centerX - 3, centerY - 8, 6, 12);
        ctx.restore();
      }

      function drawHardWaitTimer() {
        if (game.mode !== "hard" || game.titleActive || collectionScreenEl.classList.contains("active") || game.state !== "waiting") {
          return;
        }
        const remaining = clamp((HARD_WAIT_DAMAGE_TIME - game.islandWaitTime) / HARD_WAIT_DAMAGE_TIME, 0, 1);
        const centerX = Math.round(game.hero.x - game.cameraX + HERO.w / 2);
        const x = Math.round(centerX - 38);
        const y = Math.round(game.hero.y - 16);
        const w = 76;
        const h = 10;
        const gap = 3;
        const segments = 3;
        const segmentW = Math.floor((w - gap * (segments - 1)) / segments);
        const color = remaining > 0.54 ? "#54f28b" : remaining > 0.25 ? "#ffe06c" : "#ff304f";
        const pulse = remaining < 0.25 && Math.floor(game.time * 12) % 2 === 0;

        ctx.save();
        ctx.fillStyle = pulse ? "rgba(255, 48, 79, 0.36)" : "rgba(5, 5, 6, 0.72)";
        ctx.fillRect(x - 5, y - 5, w + 10, h + 10);
        ctx.fillStyle = "#050506";
        ctx.fillRect(x - 3, y - 3, w + 6, h + 6);
        ctx.fillStyle = "#141824";
        ctx.fillRect(x, y, w, h);

        for (let i = 0; i < segments; i += 1) {
          const sx = x + i * (segmentW + gap);
          const fillRatio = clamp(remaining * segments - i, 0, 1);
          ctx.fillStyle = "#263040";
          ctx.fillRect(sx, y, segmentW, h);
          if (fillRatio > 0) {
            ctx.fillStyle = color;
            ctx.fillRect(sx, y, Math.ceil(segmentW * fillRatio), h);
            ctx.fillStyle = "rgba(255, 255, 255, 0.5)";
            ctx.fillRect(sx + 1, y + 1, Math.max(0, Math.ceil(segmentW * fillRatio) - 2), 2);
          }
        }

        ctx.fillStyle = "#050506";
        ctx.fillRect(centerX - 2, y + h + 3, 4, 6);
        ctx.restore();
      }

      function drawEffects() {
        for (const effect of game.effects) {
          const t = effect.age / effect.duration;
          const alpha = Math.max(0, 1 - t);
          const itemPopup = Boolean(effect.item);
          const effectRarity = itemPopup ? (rarityMeta[effect.item.rarity] || rarityMeta.common) : null;
          const scorePopup = effect.type === "cutScoreSmall" || effect.type === "cutScoreMedium" || effect.type === "cutScoreEpic";
          const emphatic = !itemPopup && (effect.type === "red" || effect.type === "rainbow" || effect.type === "chest" || effect.type === "cutScoreEpic");
          const flash = !itemPopup && Math.floor(effect.age * 22) % 2 === 0;
          const shake = emphatic ? (flash ? 3 : -3) * (1 - t) : 0;
          const scale = emphatic
            ? 0.82 + Math.min(1, t * 8) * 0.42 + Math.sin(effect.age * 24) * 0.07
            : 0.75 + Math.min(1, t * 7) * 0.25;
          const x = Math.round(effect.x - game.cameraX + shake);
          const y = Math.round(effect.y - Math.abs(shake));
          const fill = itemPopup
            ? effectRarity.color
            : effect.type === "rainbow"
            ? (flash ? "#ffe86a" : "#9fffd1")
            : effect.type === "chest"
              ? (flash ? "#ffd86a" : "#ffb000")
              : effect.type === "slash"
                ? "#ffffff"
                : effect.type === "cutScoreSmall"
                  ? "#ffffff"
                  : effect.type === "cutScoreMedium"
                    ? "#ffe06c"
                    : effect.type === "cutScoreEpic"
                      ? (flash ? "#ffd1f0" : "#ff5fbe")
                      : (flash ? "#fff2a6" : "#ff4964");
          const shadow = itemPopup
            ? effect.item.rarity === "epic"
              ? "#67246e"
              : effect.item.rarity === "rare"
                ? "#0a506a"
                : effect.item.rarity === "uncommon"
                  ? "#6d3906"
                  : "#3a3f4a"
            : effect.type === "rainbow" ? "#bd7cff" : effect.type === "chest" ? "#6d3906" : effect.type === "slash" ? "#11344a" : effect.type === "cutScoreSmall" ? "#11344a" : effect.type === "cutScoreMedium" ? "#6d3906" : effect.type === "cutScoreEpic" ? "#5b0738" : "#650818";

          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.translate(x, y);
          ctx.scale(scale, scale);
          const textY = effect.item ? 24 : 0;

          if (effect.type === "heartLost") {
            drawHeartLossEffect(t);
            ctx.restore();
            continue;
          }

          if (emphatic) {
            const rayCount = effect.type === "rainbow" || effect.type === "cutScoreEpic" ? 18 : 14;
            const rayColors = effect.type === "rainbow"
              ? ["#ff304f", "#ffb000", "#ffe86a", "#54f28b", "#4bb8ff", "#bd7cff"]
              : effect.type === "cutScoreEpic"
                ? ["#ff5fbe", "#ffd1f0", "#ffffff", "#ffe06c"]
              : ["#ff304f", "#ffe06c", "#fff1a6"];
            const step = Math.floor(effect.age * 10);
            for (let i = 0; i < rayCount; i += 1) {
              const angle = (Math.PI * 2 * i) / rayCount + step * 0.28;
              const ring = 30 + ((step + i * 3) % 5) * 6;
              const px = Math.round(Math.cos(angle) * ring / 4) * 4;
              const py = Math.round(Math.sin(angle) * ring / 4) * 4;
              const size = i % 3 === 0 ? 8 : 5;
              ctx.fillStyle = rayColors[i % rayColors.length];
              ctx.fillRect(px - Math.floor(size / 2), py - Math.floor(size / 2), size, size);
              if (i % 4 === 0) {
                ctx.fillRect(px - 2, py - 12, 4, 8);
                ctx.fillRect(px - 12, py - 2, 8, 4);
              }
            }
          }

          if (effect.item) {
            const iconScale = Math.max(1, Math.floor(64 / Math.max(effect.item.icon[0].length, effect.item.icon.length)));
            const iconW = effect.item.icon[0].length * iconScale;
            const iconH = effect.item.icon.length * iconScale;
            const iconY = effect.isNew ? -39 : -35;
            const rarityY = effect.isNew ? -53 : -56;
            ctx.fillStyle = "rgba(0, 0, 0, 0.58)";
            ctx.fillRect(-iconW / 2 - 5, iconY - 5, iconW + 10, iconH + 10);
            paintPixelSprite(ctx, effect.item.icon, effect.item.palette, -iconW / 2, iconY, iconScale, false);
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            if (effect.isNew) {
              ctx.font = `bold 18px ${PIXEL_FONT}`;
              ctx.lineWidth = 5;
              ctx.strokeStyle = "#050506";
              ctx.strokeText("NEW!", 0, -70);
              ctx.lineWidth = 3;
              ctx.strokeStyle = "#6d3906";
              ctx.strokeText("NEW!", 0, -70);
              ctx.fillStyle = "#ffe06c";
              ctx.fillText("NEW!", 0, -70);
            }
            ctx.font = `bold 13px ${PIXEL_FONT}`;
            ctx.lineWidth = 5;
            ctx.strokeStyle = "#050506";
            ctx.strokeText(effectRarity.label, 0, rarityY);
            ctx.lineWidth = 3;
            ctx.strokeStyle = shadow;
            ctx.strokeText(effectRarity.label, 0, rarityY);
            ctx.fillStyle = effectRarity.color;
            ctx.fillText(effectRarity.label, 0, rarityY);
          }

          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          const itemNameSize = effect.item && effect.text.length > 8 ? 15 : 18;
          ctx.font = effect.item
            ? `bold ${itemNameSize}px ${PIXEL_FONT}`
            : scorePopup
              ? `bold ${effect.type === "cutScoreEpic" ? 36 : 30}px ${PIXEL_FONT}`
            : emphatic
              ? `bold 34px ${PIXEL_FONT}`
              : `bold 30px ${PIXEL_FONT}`;
          ctx.lineWidth = emphatic ? 9 : 6;
          ctx.strokeStyle = "#050506";
          ctx.strokeText(effect.text, 0, textY);
          ctx.lineWidth = emphatic ? 5 : 3;
          ctx.strokeStyle = shadow;
          ctx.strokeText(effect.text, 0, textY);
          ctx.fillStyle = fill;
          ctx.fillText(effect.text, 0, textY);

          ctx.restore();
        }
      }

      function drawHeartLossEffect(t) {
        const cell = 4;
        const split = Math.round(2 + t * 9);
        const rise = Math.round(-t * 7);
        const pattern = [
          ".xx.xx.",
          "xxxxxxx",
          "xxxxxxx",
          ".xxxxx.",
          "..xxx..",
          "...x..."
        ];
        const startX = -14;
        const startY = -20 + rise;

        for (let row = 0; row < pattern.length; row += 1) {
          for (let col = 0; col < pattern[row].length; col += 1) {
            if (pattern[row][col] !== "x") {
              continue;
            }
            const sideOffset = col < 3 ? -split : col > 3 ? split : 0;
            const px = startX + col * cell + sideOffset;
            const py = startY + row * cell + Math.round(t * (col < 3 ? -3 : 3));
            ctx.fillStyle = "#050506";
            ctx.fillRect(px - 1, py - 1, cell + 2, cell + 2);
          }
        }

        for (let row = 0; row < pattern.length; row += 1) {
          for (let col = 0; col < pattern[row].length; col += 1) {
            if (pattern[row][col] !== "x") {
              continue;
            }
            const sideOffset = col < 3 ? -split : col > 3 ? split : 0;
            const px = startX + col * cell + sideOffset;
            const py = startY + row * cell + Math.round(t * (col < 3 ? -3 : 3));
            ctx.fillStyle = row >= 3 || col > 4 ? "#9d1025" : "#ff304f";
            ctx.fillRect(px, py, cell, cell);
          }
        }

        ctx.fillStyle = "#050506";
        ctx.fillRect(-2, startY + 2, 4, 6);
        ctx.fillRect(1, startY + 8, 4, 6);
        ctx.fillRect(-3, startY + 15, 4, 5);

        const shardY = Math.round(8 + t * 18);
        ctx.fillStyle = "#ff8aa5";
        ctx.fillRect(-20 - Math.round(t * 10), shardY, 5, 5);
        ctx.fillRect(17 + Math.round(t * 9), shardY - 3, 4, 4);
        ctx.fillStyle = "#9d1025";
        ctx.fillRect(-8 - Math.round(t * 4), shardY + 8, 4, 4);
        ctx.fillRect(8 + Math.round(t * 6), shardY + 7, 5, 5);

        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.font = `bold 18px ${PIXEL_FONT}`;
        ctx.lineWidth = 5;
        ctx.strokeStyle = "#050506";
        ctx.strokeText("-1", 0, 20);
        ctx.lineWidth = 3;
        ctx.strokeStyle = "#5b0738";
        ctx.strokeText("-1", 0, 20);
        ctx.fillStyle = "#ff9aae";
        ctx.fillText("-1", 0, 20);
      }

      function drawHero() {
        const x = Math.round(game.hero.x - game.cameraX);
        const y = Math.round(game.hero.y);
        const walking = game.state === "walking";
        const step = walking ? Math.floor(game.time * 18) % 2 : 0;
        const kicking = game.hero.kickTime > 0;
        const slashing = game.hero.slashTime > 0;
        const skin = game.hero.skin;
        const accent = skin === "crimsonNinja" ? "#d88f36" : skin === "goldNinja" ? "#f1c85c" : "#d69a38";
        const palette = {
          k: "#050506",
          d: skin === "crimsonNinja" ? "#151525" : "#101321",
          p: skin === "goldNinja" ? "#2d2940" : "#252944",
          l: skin === "goldNinja" ? "#47405d" : "#343a5f",
          s: "#5e6682",
          m: "#0b0d14",
          e: "#050506",
          a: accent,
          b: "#5f3a16"
        };
        const sprite = [
          "..................",
          ".....kkkkkkkk.....",
          "....kddddddddk....",
          "...kddddddddddk...",
          "...kddppddppddk...",
          "..kddpddddddpddk..",
          "..kddddddddddddk..",
          "..kdddssssssdddk..",
          "..kddsseesseedddk.",
          "..kdddssssssdddk..",
          "...kddddddddddk...",
          "....kddddddddk....",
          ".....kkddddkk.....",
          "....kdddaadddk....",
          "...kddddaaaadddk...",
          "..kddkddddddkddk..",
          "..kk..kddddk..kk..",
          "......kddddk......",
          ".....kddddddk.....",
          ".....kddkkddk.....",
          ".....kkk..kkk.....",
          "....kkkk..kkkk....",
          "..................",
          ".................."
        ];
        const px = 2;
        const slashProgress = slashing ? 1 - game.hero.slashTime / SLASH_DURATION : 0;
        const bob = slashing ? -1 : walking ? (step === 0 ? 0 : -1) : kicking ? -1 : 0;
        const lean = slashing ? Math.round(1 + slashProgress * 2) : kicking ? 1 : 0;

        ctx.fillStyle = "rgba(0, 0, 0, 0.34)";
        ctx.fillRect(x + 7, y + HERO.h - 5, 22, 4);

        paintSpriteOutline(ctx, sprite, x + lean, y + bob, px, false, "rgba(238, 246, 255, 0.34)");

        for (let row = 0; row < sprite.length; row += 1) {
          for (let col = 0; col < sprite[row].length; col += 1) {
            const key = sprite[row][col];
            if (key === ".") {
              continue;
            }
            ctx.fillStyle = palette[key] || palette.k;
            ctx.fillRect(x + lean + col * px, y + bob + row * px, px, px);
          }
        }

        ctx.fillStyle = "rgba(255, 245, 177, 0.28)";
        ctx.fillRect(x + lean + 12, y + bob + 8, 6, 1);
        ctx.fillStyle = "rgba(255, 255, 255, 0.48)";
        ctx.fillRect(x + lean + 21, y + bob + 11, 2, 6);

        if (game.arrowHitFlash > 0 && Math.floor(game.time * 18) % 2 === 0) {
          ctx.fillStyle = "rgba(255, 48, 79, 0.32)";
          ctx.fillRect(x + lean + 5, y + bob + 5, HERO.w - 10, HERO.h - 8);
        }

        if (slashing) {
          drawSlashPose(x + lean, y + bob, palette);
        } else if (kicking) {
          drawKickPose(x + lean, y + bob, palette);
        } else if (walking) {
          drawRunPose(x + lean, y + bob, palette, step);
        }
      }

      function drawHeroSpeech() {
        if (game.mode === "hard" || !game.speech || game.state !== "walking") {
          return;
        }
        const t = clamp(game.speech.age / game.speech.duration, 0, 1);
        const alpha = t < 0.82 ? 1 : Math.max(0, (1 - t) / 0.18);
        const text = game.speech.text;
        const x = Math.round(game.hero.x - game.cameraX + HERO.w / 2);
        const y = Math.round(game.hero.y - 24 - Math.sin(game.time * 10) * 2);
        const size = text.length > 9 ? 16 : 18;

        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.font = `bold ${size}px ${PIXEL_FONT}`;
        const boxW = Math.ceil(ctx.measureText(text).width) + 18;
        const boxH = size + 18;
        const boxX = Math.round(x - boxW / 2);
        const boxY = Math.round(y - boxH / 2);

        ctx.fillStyle = "#050506";
        ctx.fillRect(boxX + 6, boxY, boxW - 12, boxH);
        ctx.fillRect(boxX, boxY + 6, boxW, boxH - 12);
        ctx.fillRect(boxX + Math.floor(boxW * 0.46), boxY + boxH - 2, 14, 8);
        ctx.fillRect(boxX + Math.floor(boxW * 0.46) + 7, boxY + boxH + 5, 8, 6);

        ctx.fillStyle = "#fff4d1";
        ctx.fillRect(boxX + 8, boxY + 4, boxW - 16, boxH - 8);
        ctx.fillRect(boxX + 4, boxY + 8, boxW - 8, boxH - 16);
        ctx.fillRect(boxX + Math.floor(boxW * 0.46) + 2, boxY + boxH - 2, 10, 7);
        ctx.fillRect(boxX + Math.floor(boxW * 0.46) + 8, boxY + boxH + 4, 5, 4);

        ctx.fillStyle = "#ffd86a";
        ctx.fillRect(boxX + 10, boxY + boxH - 5, boxW - 20, 2);

        ctx.lineWidth = 3;
        ctx.strokeStyle = "#fff4d1";
        ctx.strokeText(text, x, y);
        ctx.fillStyle = "#101321";
        ctx.fillText(text, x, y);
        ctx.restore();
      }

      function drawKickPose(x, y, palette) {
        ctx.fillStyle = palette.k;
        ctx.fillRect(x + 19, y + 33, 15, 5);
        ctx.fillRect(x + 30, y + 30, 6, 4);
        ctx.fillStyle = palette.d;
        ctx.fillRect(x + 20, y + 32, 13, 3);
        ctx.fillStyle = palette.a;
        ctx.fillRect(x + 31, y + 31, 5, 2);
        ctx.fillStyle = palette.k;
        ctx.fillRect(x + 2, y + 24, 7, 5);
        ctx.fillStyle = palette.d;
        ctx.fillRect(x + 3, y + 23, 6, 3);
      }

      function drawSlashPose(x, y, palette) {
        const progress = 1 - game.hero.slashTime / SLASH_DURATION;
        const frontStep = Math.round(3 + Math.min(1, progress * 1.6) * 5);
        const rearStep = Math.round(Math.sin(progress * Math.PI) * 2);
        ctx.fillStyle = palette.k;
        ctx.fillRect(x + 20, y + 18, 16, 5);
        ctx.fillRect(x + 5, y + 24, 9, 5);
        ctx.fillRect(x + 18 + frontStep, y + 40, 15, 5);
        ctx.fillRect(x + 3 - rearStep, y + 35, 12, 5);
        ctx.fillStyle = palette.d;
        ctx.fillRect(x + 21, y + 19, 13, 3);
        ctx.fillRect(x + 6, y + 25, 8, 3);
        ctx.fillRect(x + 19 + frontStep, y + 39, 12, 3);
        ctx.fillRect(x + 4 - rearStep, y + 34, 10, 3);
        ctx.fillStyle = palette.a;
        ctx.fillRect(x + 31, y + 17, 5, 4);
        ctx.fillRect(x + 4, y + 23, 4, 3);
      }

      function drawRunPose(x, y, palette, step) {
        ctx.fillStyle = palette.k;
        if (step === 0) {
          ctx.fillRect(x + 4, y + 28, 8, 4);
          ctx.fillRect(x + 23, y + 28, 8, 4);
          ctx.fillRect(x + 6, y + 40, 13, 4);
          ctx.fillRect(x + 18, y + 34, 5, 9);
        } else {
          ctx.fillRect(x + 4, y + 31, 8, 4);
          ctx.fillRect(x + 23, y + 25, 8, 4);
          ctx.fillRect(x + 8, y + 34, 5, 9);
          ctx.fillRect(x + 17, y + 40, 13, 4);
        }
        ctx.fillStyle = palette.a;
        ctx.fillRect(x + 14, y + 32, 8, 2);
      }

      function isTouchSlashZone(event) {
        if (event.pointerType !== "touch") {
          return false;
        }
        const rect = canvas.getBoundingClientRect();
        return event.clientX >= rect.left + rect.width * 0.5;
      }

      function onPointerDown(event) {
        event.preventDefault();
        if (isTouchSlashZone(event)) {
          game.slashButtonDown = true;
          strikeWithSword();
          return;
        }
        if (event.button === 2) {
          game.slashButtonDown = true;
          strikeWithSword();
          return;
        }
        if (event.button === 0 || event.pointerType === "touch") {
          if (startGrow()) {
            game.bridgePointerId = event.pointerId;
          }
        }
      }

      function triggerSlashInput(event) {
        if (event.pointerType === "touch") {
          return false;
        }
        if (!(event.button === 2 || (event.buttons & 2))) {
          return false;
        }
        event.preventDefault();
        game.slashButtonDown = true;
        strikeWithSword();
        return true;
      }

      function updateSecondarySlashInput(event) {
        if (event.pointerType === "touch") {
          return;
        }
        const secondaryDown = Boolean(event.buttons & 2) || event.button === 2;
        if (secondaryDown && !game.slashButtonDown) {
          triggerSlashInput(event);
          return;
        }
        if (!secondaryDown) {
          game.slashButtonDown = false;
        }
      }

      function onSecondaryPointerDown(event) {
        triggerSlashInput(event);
      }

      function onMouseDown(event) {
        if (!triggerSlashInput(event)) {
          updateSecondarySlashInput(event);
        }
      }

      function onMouseMove(event) {
        updateSecondarySlashInput(event);
      }

      function onPointerMove(event) {
        updateSecondarySlashInput(event);
      }

      function onMouseUp(event) {
        if (!(event.buttons & 2)) {
          game.slashButtonDown = false;
        }
      }

      function onPointerUp(event) {
        event.preventDefault();
        if (!(event.buttons & 2)) {
          game.slashButtonDown = false;
        }
        const bridgePointerReleased = game.bridgePointerId === event.pointerId
          || (game.bridgePointerId === null && event.pointerType !== "touch" && event.button === 0);
        if (bridgePointerReleased) {
          releaseBridge();
        }
      }

      function preventTouchDefault(event) {
        event.preventDefault();
      }

      function unlockTitleAudio() {
        if (audio.enabled && (game.titleActive || collectionScreenEl.classList.contains("active"))) {
          startTitleBgm(false);
        }
      }

      window.addEventListener("pointerdown", unlockTitleAudio, { capture: true });
      window.addEventListener("keydown", unlockTitleAudio, { capture: true });
      window.addEventListener("focus", () => {
        if (audio.enabled && (game.titleActive || collectionScreenEl.classList.contains("active"))) {
          startTitleBgm(false);
        }
      });

      window.addEventListener("pointerdown", onSecondaryPointerDown, { capture: true });
      canvas.addEventListener("pointerdown", onPointerDown);
      canvas.addEventListener("touchstart", preventTouchDefault, { passive: false });
      canvas.addEventListener("touchmove", preventTouchDefault, { passive: false });
      canvas.addEventListener("touchend", preventTouchDefault, { passive: false });
      canvas.addEventListener("touchcancel", preventTouchDefault, { passive: false });
      canvas.addEventListener("mousedown", onMouseDown);
      canvas.addEventListener("mousemove", onMouseMove);
      canvas.addEventListener("pointermove", onPointerMove);
      canvas.addEventListener("auxclick", (event) => {
        if (event.button === 2) {
          event.preventDefault();
          strikeWithSword();
        }
      });
      canvas.addEventListener("contextmenu", (event) => {
        event.preventDefault();
        strikeWithSword();
      });
      window.addEventListener("mousedown", onMouseDown, { capture: true });
      window.addEventListener("mousemove", onMouseMove, { capture: true });
      window.addEventListener("pointermove", onPointerMove, { capture: true });
      window.addEventListener("mouseup", onMouseUp, { capture: true });
      window.addEventListener("pointerup", onPointerUp);
      window.addEventListener("pointercancel", onPointerUp);
      window.addEventListener("blur", () => {
        game.slashButtonDown = false;
      });
      document.addEventListener("selectstart", preventTouchDefault);
      document.addEventListener("dragstart", preventTouchDefault);
      document.addEventListener("gesturestart", preventTouchDefault);

      window.addEventListener("keydown", (event) => {
        if (event.code === "KeyF" && !event.repeat) {
          event.preventDefault();
          toggleFullscreen();
          return;
        }
        if (collectionScreenEl.classList.contains("active")) {
          if (event.code === "Escape" || event.code === "Backspace") {
            event.preventDefault();
            hideCollection();
          }
          return;
        }
        if (game.titleActive && (event.code === "Space" || event.code === "Enter")) {
          event.preventDefault();
          startFromTitle("normal");
          return;
        }
        if (game.titleActive && event.code === "KeyH") {
          event.preventDefault();
          startFromTitle("hard");
          return;
        }
        if (event.code === "Space" && !event.repeat) {
          event.preventDefault();
          startGrow();
        }
        if ((event.code === "KeyX" || event.code === "ShiftRight") && !event.repeat) {
          event.preventDefault();
          strikeWithSword();
        }
        if (event.code === "Enter" && game.state === "gameover") {
          resetGame();
        }
        if (event.code === "KeyC" && game.state === "waiting") {
          game.hero.skin = heroSkins[game.skinIndex % heroSkins.length];
          game.skinIndex += 1;
        }
      });

      window.addEventListener("keyup", (event) => {
        if (event.code === "Space") {
          event.preventDefault();
          releaseBridge();
        }
      });

      restartBtn.addEventListener("click", (event) => {
        event.stopPropagation();
        resetGame();
        startBgm(true);
      });

      gameoverTitleBtn.addEventListener("click", (event) => {
        event.preventDefault();
        event.stopPropagation();
        returnToTitle();
      });

      titleStartBtn.addEventListener("click", (event) => {
        event.preventDefault();
        event.stopPropagation();
        startFromTitle("normal");
      });

      titleHardBtn.addEventListener("click", (event) => {
        event.preventDefault();
        event.stopPropagation();
        startFromTitle("hard");
      });

      collectionOpenBtn.addEventListener("click", (event) => {
        event.preventDefault();
        event.stopPropagation();
        showCollection();
      });

      collectionBackBtn.addEventListener("click", (event) => {
        event.preventDefault();
        event.stopPropagation();
        hideCollection();
      });

      audioToggle.addEventListener("pointerdown", (event) => {
        event.stopPropagation();
      });

      audioToggle.addEventListener("pointerup", (event) => {
        event.stopPropagation();
      });

      audioToggle.addEventListener("click", (event) => {
        event.preventDefault();
        event.stopPropagation();
        audio.enabled = !audio.enabled;
        if (audio.enabled) {
          if (game.titleActive || collectionScreenEl.classList.contains("active")) {
            startTitleBgm(true);
          } else {
            startBgm(true);
          }
        } else {
          bgmEl.pause();
          stopExtendSfx();
          updateAudioButton();
        }
      });

      fullscreenToggle.addEventListener("pointerdown", (event) => {
        event.stopPropagation();
      });

      fullscreenToggle.addEventListener("pointerup", (event) => {
        event.stopPropagation();
      });

      fullscreenToggle.addEventListener("click", (event) => {
        event.preventDefault();
        event.stopPropagation();
        toggleFullscreen();
      });

      document.addEventListener("fullscreenchange", afterFullscreenChange);
      document.addEventListener("webkitfullscreenchange", afterFullscreenChange);
      document.addEventListener("MSFullscreenChange", afterFullscreenChange);

      window.addEventListener("resize", () => {
        resize();
        if (!game.platforms.length) {
          resetGame();
        }
      });
      if (window.visualViewport) {
        window.visualViewport.addEventListener("resize", resize);
        window.visualViewport.addEventListener("scroll", resize);
      }

      let lastTime = performance.now();
      function frame(now) {
        const dt = Math.min(0.033, (now - lastTime) / 1000);
        lastTime = now;
        update(dt);
        draw();
        requestAnimationFrame(frame);
      }

      resize();
      resetGame();
      updateAudioButton();
      updateFullscreenButton();
      startTitleBgm(true);
      requestAnimationFrame(frame);
    })();
  </script>
</body>
</html>
